        wallet_id:
          $ref: '#/components/schemas/KSUID'
        address:
          type: string
          description: The wallet address
          example: '0x165cd37b4c644c2921454429e7f9358d18a45e14'
        balances:
          type: array
          items:
            $ref: '#/components/schemas/AssetBalance'
          description: List of asset balances
