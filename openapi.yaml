                rail: ach
                operation: inbound_posted
                scenario: success_immediate
                state: settled
                organization_id: org_01HXYZ
                account_id: acc_123
                amount: '100.00'
                currency: USD
                created_at: '2024-01-15T10:30:00Z'
                completed_at: '2024-01-15T10:30:05Z'
                callbacks:
                  - callback_id: cb_001
                    state: delivered
                    attempts: 1
                    max_attempts: 3
                    scheduled_for: '2024-01-15T10:30:01Z'
                    delivered_at: '2024-01-15T10:30:02Z'
        '403':
          description: Not available in production
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#forbidden
                title: Not available in production
                status: 403
                detail: Not available in production
                instance: https://api.platform.dakota.xyz/sandbox/simulations/example-id
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '404':
          description: Simulation not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#not-found
                title: Simulation not found
                status: 404
                detail: Simulation not found
                instance: https://api.platform.dakota.xyz/sandbox/simulations/example-id
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '502':
          description: Provider gRPC error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#provider-error
                title: Provider gRPC error
                status: 502
                detail: Provider gRPC error
                instance: https://api.platform.dakota.xyz/sandbox/simulations/example-id
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
      externalDocs:
        description: Read full guide in docs
        url: https://docs.dakota.xyz/api-reference/sandbox/get-simulation-status
  /sandbox/scenarios:
    get:
      operationId: listSandboxScenarios
      summary: List available simulation scenarios
      description: |
        Returns the catalog of all scenarios that can be passed as the `scenario`
        field to `POST /sandbox/simulate/inbound`. Use this to discover valid
        scenario names and understand their behaviour without reading source code.
      tags:
        - Sandbox
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Catalog of available scenarios
          content:
            application/json:
              schema:
                type: object
                required:
                  - scenarios
                properties:
                  scenarios:
                    type: array
                    items:
                      $ref: '#/components/schemas/SandboxScenario'
              example:
                scenarios:
                  - name: success_immediate
                    description: Simulates an immediate successful settlement callback sequence.
                    valid_for:
                      - ach_inbound
                      - wire_inbound
                    stateful: false
                    example_webhook_sequence:
                      - transaction.created
                      - transaction.completed
        '403':
          description: Not available outside sandbox mode
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#forbidden
                title: Forbidden
                status: 403
                detail: Endpoint only available in sandbox mode
                instance: https://api.platform.dakota.xyz/sandbox/scenarios
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
      externalDocs:
        description: Read full guide in docs
        url: https://docs.dakota.xyz/api-reference/sandbox/list-available-simulation-scenarios
  /sandbox/simulations/{simulation_id}/advance:
    post:
      tags:
        - Sandbox
      summary: Advance a paused simulation
      description: |
        Unpauses a stateful sandbox simulation that is currently waiting at an
        intermediate state (awaiting_advance = true). Use this to drive
        compliance_hold, manual_review, and unconfirmed scenarios past their
        pause point.

        Valid actions per scenario:
        - **compliance_hold**: `release`, `reject`
        - **manual_review**: `approve`, `reject`
        - **unconfirmed** (crypto): `confirm`, `expire`

        The endpoint is concurrency-safe: concurrent advance calls for the same
        simulation_id are handled atomically — exactly one wins, the rest receive
        409 Conflict.

        Available in sandbox mode only.
      operationId: advanceSimulation
      security:
        - ApiKeyAuth: []
      parameters:
        - name: simulation_id
          in: path
          required: true
          schema:
            type: string
          description: The simulation_id returned by POST /sandbox/simulate/inbound
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceSimulationRequest'
            example:
              action: release
              reason_code: R10
      responses:
        '200':
          description: Simulation advanced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvanceSimulationResult'
              example:
                simulation_id: sim_hold_001
                previous_state: compliance_hold
                new_state: release
                callbacks_scheduled: 1
        '400':
          description: Invalid action for this scenario
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#invalid-request
                title: Invalid action for this scenario
                status: 400
                detail: Invalid action for this scenario
                instance: https://api.platform.dakota.xyz/sandbox/simulations/example-id/advance
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '403':
          description: Not available in production
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#forbidden
                title: Not available in production
                status: 403
                detail: Not available in production
                instance: https://api.platform.dakota.xyz/sandbox/simulations/example-id/advance
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '404':
          description: Simulation not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#not-found
                title: Simulation not found
                status: 404
                detail: Simulation not found
                instance: https://api.platform.dakota.xyz/sandbox/simulations/example-id/advance
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '409':
          description: Simulation is not awaiting advance (already advanced or not paused)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#conflict
                title: Simulation is not awaiting advance
                status: 409
                detail: Simulation is not awaiting advance (already advanced or not paused)
                instance: https://api.platform.dakota.xyz/sandbox/simulations/example-id/advance
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '502':
          description: Provider gRPC error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#provider-error
                title: Provider gRPC error
                status: 502
                detail: Provider gRPC error
                instance: https://api.platform.dakota.xyz/sandbox/simulations/example-id/advance
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
      externalDocs:
        description: Read full guide in docs
        url: https://docs.dakota.xyz/api-reference/sandbox/advance-a-paused-simulation
components:
  parameters:
    IdempotencyKeyHeader:
      name: x-idempotency-key
      in: header
      required: true
      description: Unique key to ensure request idempotency. If the same key is used within a certain time window, the original response will be returned instead of executing the request again.
      schema:
        type: string
        format: uuid
    StartingAfterParam:
      name: starting_after
      in: query
      required: false
      description: A cursor for use in pagination. `starting_after` is a KSUID for the object you are listing that defines your place in the list. For instance, if you make a list request and receive 100 objects, ending with ID `2B5J8KZ9N7M1K3P6Q8R4T7V9`, your subsequent call can include `starting_after=2B5J8KZ9N7M1K3P6Q8R4T7V9` in order to fetch the next page of the list.
      schema:
        $ref: '#/components/schemas/KSUID'
    EndingBeforeParam:
      name: ending_before
      in: query
      required: false
      description: A cursor for use in pagination. `ending_before` is a KSUID for the object you are listing that defines your place in the list. For instance, if you make a list request and receive 100 objects, starting with ID `2B5J8KZ9N7M1K3P6Q8R4T7V9`, your subsequent call can include `ending_before=2B5J8KZ9N7M1K3P6Q8R4T7V9` in order to fetch the previous page of the list.
      schema:
        $ref: '#/components/schemas/KSUID'
    LimitParam:
      name: limit
      in: query
      required: false
      description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 20.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    ApplicationTokenAuth:
      type: apiKey
      in: header
      name: X-Application-Token
      description: |
        Application-specific token for public URL access. Generated when a customer is created.
        Provides access to a single application without requiring an API key.
        Token is valid for 30 days and rate-limited to 100 requests per hour.
  schemas:
    SandboxScenario:
      type: object
      required:
        - name
        - description
        - valid_for
        - stateful
        - example_webhook_sequence
      properties:
        name:
          type: string
          description: Scenario identifier passed as `scenario` in simulate/inbound requests.
          example: success_immediate
        description:
          type: string
          description: Human-readable explanation of what this scenario simulates.
        valid_for:
          type: array
          items:
            type: string
          description: Transaction types (`type` field) that support this scenario.
        stateful:
          type: boolean
          description: Whether this scenario creates a paused simulation that requires POST /{id}/advance to complete.
        advance_actions:
          type: array
          items:
            type: string
          description: Valid actions for POST /{id}/advance. Only present when stateful=true.
        example_webhook_sequence:
          type: array
          items:
            type: string
          description: Typical sequence of webhook events fired for this scenario.
    SimulationState:
      type: string
      enum:
        - accepted
      description: State of a sandbox simulation after submission.
    SimulationCallbackRecord:
      type: object
      description: One callback delivery log entry for a simulation.
      properties:
        callback_id:
          type: string
          description: Opaque callback identifier (UUID)
        payload_json:
          type: string
          description: Full webhook payload (JSON-encoded string)
        scheduled_for:
          type: string
          format: date-time
          description: When the callback is scheduled to fire
        state:
          type: string
          enum:
            - pending
            - delivered
            - failed
          description: Delivery state of this callback
        attempts:
          type: integer
          description: Number of delivery attempts made
        max_attempts:
          type: integer
          description: Maximum allowed delivery attempts
        delivered_at:
          type: string
          format: date-time
          description: When the callback was successfully delivered (omitted if not yet delivered)
        last_error:
          type: string
          description: Last error message if delivery failed
    AdvanceSimulationRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          description: |
            The action to take. Valid values depend on the scenario:
            - compliance_hold: "release" | "reject"
            - manual_review: "approve" | "reject"
            - unconfirmed: "confirm" | "expire"
          example: release
        reason_code:
          type: string
          description: Optional reason code for the action (e.g. R10 for ACH return).
          example: R10
    AdvanceSimulationResult:
      type: object
      required:
        - simulation_id
        - previous_state
        - new_state
        - callbacks_scheduled
      properties:
        simulation_id:
          type: string
          description: The simulation that was advanced.
          example: sim_01HXYZ
        previous_state:
          type: string
          description: The state position before advancing (e.g., "compliance_hold").
          example: compliance_hold
        new_state:
          type: string
          description: The state position after advancing (e.g., "release").
          example: release
        callbacks_scheduled:
          type: integer
          description: Number of new callbacks scheduled by this advance action.
          example: 1
    SimulationInspection:
      type: object
      description: Full simulation state including callback history.
      required:
        - simulation_id
        - rail
        - operation
        - scenario
        - state
        - organization_id
        - amount
        - currency
        - created_at
      properties:
        simulation_id:
          type: string
          description: Simulation identifier
        rail:
          type: string
          description: Payment rail (ach, wire, crypto)
        operation:
          type: string
          description: Operation type (inbound_posted, outbound_failed, etc.)
        scenario:
          type: string
          description: Scenario name (success_immediate, success_delayed, compliance_hold, etc.)
        state:
          type: string
          description: Current simulation state (accepted, settled, returned, rejected, failed)
        state_position:
          type: string
          description: Sub-state for multi-step scenarios (e.g. post_hold)
        awaiting_advance:
          type: boolean
          description: Whether the simulation is paused waiting for a POST /advance call
        organization_id:
          type: string
          description: Organization that owns this simulation
        account_id:
          type: string
          description: Platform account ID (for fiat simulations)
        wallet_id:
          type: string
          description: Platform wallet ID (for crypto simulations)
        amount:
          type: string
          description: Amount as decimal string (e.g. "100.50")
        currency:
          type: string
          description: ISO 4217 currency code
        trace_id:
          type: string
          description: Caller-supplied trace ID
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Caller-supplied metadata (informational only)
        created_at:
          type: string
          format: date-time
          description: When the simulation was created
        completed_at:
          type: string
          format: date-time
          description: When the simulation reached a terminal state (omitted if still in progress)
        callbacks:
          type: array
          items:
            $ref: '#/components/schemas/SimulationCallbackRecord'
          description: Callback delivery log ordered by scheduled_for ascending
        advance_actions_available:
          type: array
          items:
            type: string
          description: Valid advance actions when awaiting_advance is true (e.g. ["release", "reject"])
    AssetDeployment:
      type: object
      required:
        - id
        - name
        - network_id
        - contract_address
        - token_standard
        - decimals
      properties:
        id:
          type: string
          description: The symbol of the asset (e.g., USDC, ETH)
          example: USDC
        name:
          type: string
          description: The full name of the asset
          example: USD Coin
        network_id:
          $ref: '#/components/schemas/NetworkId'
        contract_address:
          type: string
          description: The contract address of the asset on the network
          example: '0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48'
        token_standard:
          type: string
          description: The token standard (e.g., erc20, spl)
          example: erc20
        decimals:
          type: integer
          description: The number of decimal places for this asset
          example: 6
    ClientUser:
      type: object
      description: User object representing a user in the system, including all clients they can access.
      required:
        - id
        - first_name
        - last_name
        - email
        - role
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        first_name:
          type: string
          description: Given name of the user.
          example: John
        last_name:
          type: string
          description: Surname of the user.
          example: Doe
        email:
          type: string
          description: Email address of the user.
          example: john@example.com
        role:
          $ref: '#/components/schemas/ClientUserRole'
        swift_enabled:
          type: boolean
          description: Whether the client has SWIFT payments enabled.
        created_at:
          type: integer
          description: Timestamp of when the user was created.
          example: 1234567890
    ClientUserRole:
      type: string
      description: Role that can be assigned to a client user
      enum:
        - admin
        - viewer
      example: admin
    CreateClientUserRequest:
      type: object
      description: Request body for creating a new client user
      required:
        - first_name
        - last_name
        - email
        - role
      properties:
        first_name:
          type: string
          description: Given name of the user
          example: John
          minLength: 1
        last_name:
          type: string
          description: Surname of the user
          example: Doe
          minLength: 1
        email:
          type: string
          format: email
          description: Email address of the user
          example: john@example.com
        role:
          $ref: '#/components/schemas/ClientUserRole'
    UpdateClientUserRequest:
      type: object
      description: Request body for updating a client user
      properties:
        first_name:
          type: string
          description: Given name of the user
          example: John
          minLength: 1
        last_name:
          type: string
          description: Surname of the user
          example: Doe
          minLength: 1
        role:
          $ref: '#/components/schemas/ClientUserRole'
    PaginatedListResponse:
      type: object
      description: Wrapper for paginated list responses
      required:
        - data
        - meta
      properties:
        data:
          type: array
          description: List of objects returned by the API
          items:
            type: object
        meta:
          $ref: '#/components/schemas/Meta'
    Meta:
      type: object
      description: Meta information about the response
      required:
        - total_count
        - has_more_after
        - has_more_before
      properties:
        total_count:
          type: integer
          description: Total number of items available
          example: 100
        has_more_after:
          type: boolean
          description: Indicates whether there are more items that follow this set.
          example: true
        has_more_before:
          type: boolean
          description: Indicates whether there are more items that precede this set.
          example: false
    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
      description: |
        Error response following RFC 9457 Problem Details.
        Public API error responses use this format.
      properties:
        type:
          type: string
          format: uri
          description: |
            URI reference identifying the problem type.
            Resolves to human-readable documentation.
          example: https://docs.dakota.xyz/api-reference/errors#not-found
        title:
          type: string
          description: Short, human-readable summary of the problem type. Stable across occurrences.
          example: Customer Not Found
        status:
          type: integer
          description: HTTP status code for this occurrence.
          example: 404
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
          example: Customer cst_2abc123 was not found in your organization.
        instance:
          type: string
          format: uri
          description: The request path that triggered this error.
          example: https://api.platform.dakota.xyz/customers/cst_2abc123
        request_id:
          type: string
          description: Unique request identifier. Include when contacting support.
          example: req_7f3a8b2c
        errors:
          type: array
          description: Field-level validation errors (present for validation failures).
          items:
            $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Field path using dot notation for nested fields.
          example: bank_account.routing_number
        message:
          type: string
          description: Human-readable description of the field error.
          example: Routing number must be exactly 9 digits
        code:
          type: string
          description: Machine-readable error code for this field.
          example: invalid_format
    EventType:
      type: string
      description: Canonical outbound event type identifier.
      enum:
        - user.created
        - user.updated
        - user.deleted
        - api_key.created
        - api_key.deleted
        - customer.created
        - customer.updated
        - customer.kyb_link.created
        - customer.kyb_link.updated
        - customer.kyb_status.created
        - customer.kyb_status.updated
        - auto_account.created
        - auto_account.updated
        - auto_account.deleted
        - transaction.auto.created
        - transaction.auto.updated
        - transaction.one_off.created
        - transaction.one_off.updated
        - recipient.created
        - recipient.updated
        - recipient.deleted
        - destination.created
        - destination.deleted
        - target.created
        - target.updated
        - target.deleted
        - exception.created
        - exception.cleared
        - bvnk.onboarding.created
        - bvnk.onboarding.updated
        - wallet.created
        - wallet.updated
        - wallet.signer_group.created
        - wallet.signer_group.updated
        - wallet.policy.created
        - wallet.policy.updated
        - wallet.transaction.created
        - wallet.transaction.updated
        - wallet.deposit
      example: transaction.auto.updated
    EventRequest:
      type: object
      description: Request metadata for the original operation that emitted the event, when available.
      properties:
        id:
          type: string
          nullable: true
          description: Request identifier of the originating API call.
          example: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        idempotency_key:
          type: string
          nullable: true
          description: Idempotency key used on the originating request, if provided.
          example: 8ad0a5e9-2e1c-49c4-a2ba-0f6fdd49a3a6
    EventData:
      type: object
      required:
        - object
      properties:
        object:
          type: object
          description: Event resource snapshot after provider-field sanitization.
          additionalProperties: true
        previous_attributes:
          type: object
          description: Sparse set of attributes before an update, when available.
          additionalProperties: true
    Event:
      type: object
      description: Canonical event envelope used for outbound webhooks and event stream retrieval.
      required:
        - id
        - type
        - created
        - api_version
        - data
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        type:
          $ref: '#/components/schemas/EventType'
        created:
          type: integer
          description: Unix timestamp in seconds when the event was emitted.
          example: 1735689600
        api_version:
          type: string
          description: Version of the event envelope schema.
          example: 1.0.0
        request:
          $ref: '#/components/schemas/EventRequest'
        data:
          $ref: '#/components/schemas/EventData'
        metadata:
          type: object
          description: Optional event metadata with implementation-specific, non-provider fields.
          additionalProperties: true
    PaginatedEventResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedListResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Event'
    NetworkId:
      type: string
      description: Identifier for a blockchain network
      example: ethereum-mainnet
      enum:
        - ethereum-mainnet
        - ethereum-sepolia
        - ethereum-goerli
        - ethereum-holesky
        - solana-mainnet
        - solana-devnet
        - solana-testnet
        - base-mainnet
        - base-sepolia
        - arbitrum-mainnet
        - arbitrum-sepolia
        - optimism-mainnet
        - optimism-sepolia
        - polygon-mainnet
        - polygon-amoy
      minLength: 1
      maxLength: 30
    ApiKeyResponse:
      type: object
      required:
        - id
        - key
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        key:
          type: string
          description: The API key value (only shown once at creation)
          example: dk_live_4KLkSmzQbL6Xs8xnUjssdGHX7PfhHpAb
    ApiKeyListItem:
      type: object
      required:
        - id
        - user_id
        - key_suffix
        - created_at
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        user_id:
          $ref: '#/components/schemas/KSUID'
        key_suffix:
          type: string
          description: Last six characters of the API key
          example: HpAb4a
        created_at:
          type: integer
          description: Timestamp of when the API key was created
          example: 1234567890
    KSUID:
      type: string
      title: KSUID
      description: KSUID is a 27-character globally unique ID that combines a timestamp with a random component. Used for all entity identifiers in the Dakota platform.
      pattern: ^[0-9A-Za-z]{27}$
      minLength: 27
      maxLength: 27
      example: 1NFHrqBHb3cTfLVkFSGmHZqdDPi
    CRI:
      type: object
      title: Crypto Resource Identifier
      description: 'A unique identifier for a specific account on a specific blockchain. When rendered as a string, it has the syntax: <network-id>://<canonical-address> (e.g., ethereum-mainnet://0x165cd37b4c644c2921454429e7f9358d18a45e14)'
      required:
        - network_id
        - crypto_address
      properties:
        network_id:
          $ref: '#/components/schemas/NetworkId'
        crypto_address:
          type: string
          description: The blockchain address (case-sensitive on some blockchains)
          example: '0x165cd37b4c644c2921454429e7f9358d18a45e14'
    Asset:
      type: string
      title: Asset
      description: ISO 4217 symbol representing a fiat asset.
      pattern: ^[A-Z]{3}$
      minLength: 3
      maxLength: 3
      example: USD
    Address:
      type: object
      title: Address
      description: Standardized physical address format used throughout the Dakota platform for user and entity addresses.
      required:
        - street1
        - city
        - country
      properties:
        street1:
          type: string
          description: Primary street address line
          example: 123 Main St
        street2:
          type: string
          description: Secondary address information such as apartment, suite, or unit number
          example: Apt 4B
        street3:
          type: string
          description: Additional address information like building name or floor
          example: Building C
        city:
          type: string
          description: City or locality name
          example: San Francisco
        region:
          type: string
          description: Full name of state, province, or region
          example: California
        postal_code:
          type: string
          description: Postal or ZIP code
          example: '94105'
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code (two-letter country code)
          example: US
          minLength: 2
          maxLength: 2
    Country:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
          pattern: ^[A-Z]{2}$
          minLength: 2
          maxLength: 2
          example: CA
        name:
          type: string
          example: Canada
    CustomerCreateRequest:
      type: object
      description: Request to create a customer and subsequently initiate a Know Your Business (KYB) verification process.
      properties:
        name:
          type: string
          description: Name of the customer - either a person's name or company name. Must contain at least one non-whitespace character.
          example: Acme Corporation
          minLength: 3
          maxLength: 100
          pattern: .*\S.*
        customer_type:
          type: string
          description: Type of entity being created - either an individual person or a company/organization.
          enum:
            - individual
            - business
          example: business
        external_id:
          type: string
          description: Unique identifier for the customer in the client's system. This ID is used to track the customer in the client's database.
          example: external_customer_123
      required:
        - name
        - customer_type
    CustomerCreateResponse:
      type: object
      description: Response returned when a customer creation process is successfully initiated.
      required:
        - id
        - kyb_links
        - application_id
        - application_url
        - application_expires_at
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        kyb_links:
          type: array
          description: KYB Links for different providers used in the KYB process.
          items:
            $ref: '#/components/schemas/KybLink'
        application_id:
          $ref: '#/components/schemas/KSUID'
          description: Unique identifier for the automatically created application record
        application_url:
          type: string
          format: uri
          description: Public URL for completing the application via web form (includes embedded token)
          example: https://apply.dakota.com/applications/2WGC9cKv9P4K8eGzqY6qJ3Xz7Qm?token=kJ8xN3zQ9mL2pR5vY7wC1aF4dG6hK0sT8uW3nB5eM9
        application_expires_at:
          type: integer
          format: int64
          description: Unix timestamp (nanoseconds) when the application token expires (30 days from creation)
          example: 1734567890000000000
    Customer:
      type: object
      description: Response containing the current status of a KYB verification process including provider-specific statuses.
      required:
        - id
        - name
        - customer_type
        - kyb_status
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        name:
          type: string
          description: Name of the customer
          example: Acme Corp
        email:
          type: string
          description: Email address of the customer
          example: contact@acmecorp.com
        customer_type:
          type: string
          description: Type of entity - either an individual person or a company/organization
          enum:
            - individual
            - business
          example: business
        kyb_status:
          $ref: '#/components/schemas/KybStatus'
        kyb_links:
          type: array
          description: KYB Links for different providers used in the KYB process.
          items:
            $ref: '#/components/schemas/KybLink'
        provider_statuses:
          type: array
          description: Detailed status information from different verification providers used in the KYB process.
          items:
            $ref: '#/components/schemas/ProviderKybStatus'
        application_id:
          $ref: '#/components/schemas/KSUID'
          description: ID of the KYB application associated with this customer
        decision:
          type: string
          description: Application decision status
          enum:
            - approved
            - declined
            - auto_declined
            - withdrawn
          example: approved
        application_url:
          type: string
          description: URL for accessing the onboarding application
          example: https://onboarding.example.com/applications/abc123?token=xyz789
        created_at:
          type: integer
          description: Timestamp of when the link was created
          example: 1234567890
        updated_at:
          type: integer
          description: Timestamp of when the link was last updated.
          example: 1234567890
        deleted_at:
          type: integer
          description: Timestamp of when the link was deleted
          example: 1234567890
    KybStatus:
      type: string
      description: Overall status of the KYB verification process (e.g., pending, active, restricted).
      example: pending
      enum:
        - active
        - pending
        - partner_review
        - rejected
        - frozen
    ProviderKybStatus:
      type: object
      required:
        - provider_id
        - status
      properties:
        provider_id:
          type: string
          description: ID of the verification provider or service used for a specific check.
          example: trm_labs
        status:
          type: string
          description: Current verification status with this specific provider.
          example: approved
          enum:
            - not_started
            - in_review
            - approved
            - rejected
            - requires_info
            - frozen
        endorsements:
          type: array
          items:
            type: string
          description: Array of endorsements associated with this provider status.
    KybLink:
      type: object
      description: Link to the KYB verification portal or dashboard for a specific provider.
      required:
        - provider_id
        - link_type
        - url
        - status
        - created_at
        - updated_at
      properties:
        provider_id:
          type: string
          description: ID of the verification provider or service used for a specific check.
          example: trm_labs
        link_type:
          $ref: '#/components/schemas/KybLinkType'
        url:
          type: string
          description: URL link to the KYB verification portal or dashboard where the entity can complete the verification process.
          example: https://verify.provider.com/kyb/a1b2c3d4e5f6
        status:
          $ref: '#/components/schemas/KybLinkStatus'
        created_at:
          type: integer
          description: Timestamp of when the link was created
          example: 1234567890
        updated_at:
          type: integer
          description: Timestamp of when the link was last updated.
          example: 1234567890
        expires_at:
          type: integer
          description: Timestamp of when the link will expire.
          example: 1234567890
        deleted_at:
          type: integer
          description: Timestamp of when the link was deleted
          example: 1234567890
    KybLinkType:
      type: string
      title: KYB Link Type
      description: Type of link provided by a verification provider for KYB verification.
      enum:
        - persona
        - tos
      example: persona
    KybLinkStatus:
      type: string
      title: KYB Link Status
      description: Current status of the KYB verification link.
      enum:
        - not_started
        - pending
        - expired
        - approved
        - rejected
        - in_review
      example: pending
    ApplicationStatus:
      type: string
      title: Application Status
      description: |
        Current status of an application in the onboarding flow.

        Status flow:
        - `pending` - Initial state, not yet submitted
        - `submitted` - Submitted for verification
        - `under_review` - Being reviewed by compliance team
        - `request_for_information` - Admin requesting additional info/documents from applicant
        - `admin_revision` - Admin making corrections to application data
        - `approved` - Application approved
        - `declined` - Application declined
        - `completed` - Legacy status (deprecated, use approved/declined instead)
      enum:
        - pending
        - submitted
        - under_review
        - request_for_information
        - admin_revision
        - approved
        - declined
        - completed
      example: submitted
    Family:
      type: string
      title: Family
      description: Blockchain family for the crypto account.
      enum:
        - evm
        - solana
      example: evm
    PaymentCapability:
      type: string
      title: Payment Capability
      description: Type of payment rail capability supported.
      enum:
        - ach
        - fedwire
        - swift
        - sepa
      example: ach
    TransactionStatus:
      type: string
      title: Transaction Status
      description: Current status of a transaction.
      enum:
        - timed_out
        - not_started
        - in_progress
        - awaiting_confirmation
        - pending
        - processing
        - completed
        - invalid
        - failed
        - canceled
        - reversed
        - rejected
        - broadcasted
        - pending_return
        - returned
    TransactionType:
      type: string
      title: Transaction Type
      description: Type of transaction.
      enum:
        - onramp
        - offramp
        - swap
      example: onramp
    TransactionResourceType:
      type: string
      title: Transaction Resource Type
      description: Top-level transaction resource family.
      enum:
        - one_off
        - wallet
        - auto_account
      example: one_off
    Capabilities:
      type: array
      title: Capabilities
      description: List of payment capabilities supported by a rail. Currently, as input, you can only request one in this list. This constraint will be loosened in the future.
      items:
        $ref: '#/components/schemas/PaymentCapability'
      minItems: 1
      example:
        - ach
        - fedwire
    AccountType:
      type: string
      title: Account Type
      description: Unified account family for account resources.
      enum:
        - onramp
        - offramp
        - swap
      example: onramp
    AccountCreateRequest:
      type: object
      title: Account Create Request
      description: Unified account create request for onramp/offramp/swap.
      required:
        - account_type
      properties:
        account_type:
          $ref: '#/components/schemas/AccountType'
        capabilities:
          $ref: '#/components/schemas/Capabilities'
        rail:
          $ref: '#/components/schemas/PaymentCapability'
        crypto_destination_id:
          $ref: '#/components/schemas/KSUID'
        fiat_destination_id:
          $ref: '#/components/schemas/KSUID'
        destination_network_id:
          $ref: '#/components/schemas/NetworkId'
        source_network_id:
          type: string
          description: Source network ID or wildcard network for crypto input.
          example: ethereum-mainnet
        source_asset:
          type: string
          description: Asset to send into the account.
          example: USDC
          minLength: 1
        destination_asset:
          type: string
          description: Asset to receive at the destination.
          example: USDC
          minLength: 1
        return_address:
          $ref: '#/components/schemas/CRI'
        return_crypto_address:
          $ref: '#/components/schemas/CRI'
        developer_fee_bps:
          type: integer
          format: int32
          description: Developer fee in basis points (1 bp = 0.01%).
          example: 50
          minimum: 0
          maximum: 10000
    AccountUpdateRequest:
      type: object
      title: Account Update Request
      description: Unified account update request for onramp/offramp/swap.
      required:
        - account_type
      properties:
        account_type:
          $ref: '#/components/schemas/AccountType'
        crypto_destination_id:
          $ref: '#/components/schemas/KSUID'
        fiat_destination_id:
          $ref: '#/components/schemas/KSUID'
        destination_network_id:
          $ref: '#/components/schemas/NetworkId'
        destination_asset:
          type: string
          description: Asset to receive at the destination.
          example: USDC
    AccountResponse:
      type: object
      title: Account Response
      description: Unified account response for onramp/offramp/swap.
      required:
        - id
        - account_type
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        account_type:
          $ref: '#/components/schemas/AccountType'
        bank_account:
          $ref: '#/components/schemas/BankAccount'
        destination:
          $ref: '#/components/schemas/DestinationResponseUnion'
        source_crypto_address:
          type: string
          description: Source crypto address for offramp/swap accounts.
          example: '0x1234'
        source_family:
          $ref: '#/components/schemas/Family'
        source_network_id:
          $ref: '#/components/schemas/NetworkId'
        source_asset:
          type: string
          description: Asset sent into the account.
          example: USDC
        destination_asset:
          type: string
          description: Asset received at the destination.
          example: USDC
        rail:
          $ref: '#/components/schemas/PaymentCapability'
        destination_rail:
          $ref: '#/components/schemas/PaymentCapability'
    PaginatedAccountResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedListResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AccountResponse'
    BankAccount:
      type: object
      title: Bank Account
      description: Unified schema for bank accounts.
      required:
        - id
        - capabilities
        - account_holder_name
        - bank_name
        - bank_address
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        capabilities:
          $ref: '#/components/schemas/Capabilities'
        aba_routing_number:
          type: string
          description: ABA routing number for US accounts for general purposes incl. ACH.
          example: '123456789'
        aba_wire_routing_number:
          type: string
          description: ABA routing number for wire transfers (if different).
          example: '123456789'
        account_number:
          type: string
          description: Account number for the US bank account.
          example: '123456789'
        account_type:
          type: string
          description: Type of bank account (for US accounts).
          enum:
            - checking
            - savings
          example: checking
        bic:
          type: string
          description: BIC/SWIFT code for the international bank account.
          example: DEUTDEFFXXX
        iban:
          type: string
          description: IBAN for the international bank account.
          example: DE89370400440532013000
        account_holder_name:
          type: string
          description: Name of the account holder.
          example: John Doe
        account_holder_address:
          $ref: '#/components/schemas/Address'
          description: Address of the account holder.
        account_holder_phone:
          type: string
          description: Phone number of the account holder.
          example: '1234567890'
        bank_name:
          type: string
          description: Name of the bank.
          example: Bank of America
        bank_address:
          $ref: '#/components/schemas/Address'
          description: Address of the bank.
        bank_phone:
          type: string
          description: Phone number of the bank.
          example: '+12345678900'
    DestinationRequestUnion:
      title: Destination Request Union
      description: Union type for different destination requests with destination_type discriminator
      oneOf:
        - $ref: '#/components/schemas/CryptoDestinationRequest'
        - $ref: '#/components/schemas/FiatUSDestinationRequest'
        - $ref: '#/components/schemas/FiatIBANDestinationRequest'
      discriminator:
        propertyName: destination_type
        mapping:
          crypto: '#/components/schemas/CryptoDestinationRequest'
          fiat_us: '#/components/schemas/FiatUSDestinationRequest'
          fiat_iban: '#/components/schemas/FiatIBANDestinationRequest'
    DestinationRequest:
      type: object
      title: Destination Request
      description: Base schema for destination requests with a discriminator based on destination type.
      required:
        - destination_type
      properties:
        destination_type:
          type: string
          description: The type of destination.
          enum:
            - crypto
            - fiat_us
            - fiat_iban
      discriminator:
        propertyName: destination_type
        mapping:
          crypto: '#/components/schemas/CryptoDestinationRequest'
          fiat_us: '#/components/schemas/FiatUSDestinationRequest'
          fiat_iban: '#/components/schemas/FiatIBANDestinationRequest'
    CryptoDestinationRequest:
      type: object
      title: Crypto Destination Request
      description: Request for creating or updating a cryptocurrency destination.
      allOf:
        - $ref: '#/components/schemas/DestinationRequest'
        - type: object
          properties:
            destination_type:
              type: string
              enum:
                - crypto
              default: crypto
            name:
              type: string
              description: Name of the destination for reference
              example: My Ethereum Wallet
            crypto_address:
              type: string
              example: '0x1234'
            network_id:
              $ref: '#/components/schemas/NetworkId'
          required:
            - crypto_address
            - name
    FiatUSDestinationRequest:
      type: object
      title: US Fiat Destination Request
      description: Request for creating or updating a US bank account destination.
      allOf:
        - $ref: '#/components/schemas/DestinationRequest'
        - type: object
          properties:
            destination_type:
              type: string
              enum:
                - fiat_us
              default: fiat_us
            name:
              type: string
              description: Name of the destination for reference
              example: Primary US Bank Account
            aba_routing_number:
              type: string
              example: '123456789'
            aba_wire_routing_number:
              type: string
              example: '123456789'
            account_number:
              type: string
              example: '123456789'
            account_type:
              type: string
              enum:
                - checking
                - savings
              example: checking
            account_holder_name:
              type: string
              example: John Doe
            account_holder_address:
              $ref: '#/components/schemas/Address'
            account_holder_phone:
              type: string
              example: '1234567890'
            bank_name:
              type: string
              example: Bank of America
            bank_address:
              description: Address of the bank. Optional for US domestic transfers.
              allOf:
                - $ref: '#/components/schemas/Address'
            bank_phone:
              type: string
              example: '1234567890'
          required:
            - name
            - aba_routing_number
            - account_number
            - account_type
            - account_holder_name
            - bank_name
    FiatIBANDestinationRequest:
      type: object
      title: IBAN Fiat Destination Request
      description: Request for creating or updating an IBAN bank account destination (for SWIFT and SEPA transfers).
      allOf:
        - $ref: '#/components/schemas/DestinationRequest'
        - type: object
          properties:
            destination_type:
              type: string
              enum:
                - fiat_iban
              default: fiat_iban
            assets:
              type: array
              description: List of assets requested to be supported by the account.
              items:
                type: string
                enum:
                  - USD
                  - EUR
                default: USD
            name:
              type: string
              description: Name of the destination for reference
              example: International Business Account
            iban:
              type: string
              description: IBAN (International Bank Account Number) for the account.
              example: DE89370400440532013000
            bic:
              type: string
              description: BIC/SWIFT code for the international bank account (optional for SEPA, required for SWIFT).
              example: DEUTDEFFXXX
            account_holder_name:
              type: string
              example: John Doe
            account_holder_address:
              $ref: '#/components/schemas/Address'
            account_holder_phone:
              type: string
              example: '1234567890'
            bank_name:
              type: string
              example: Deutsche Bank
            bank_address:
              description: Address of the bank. Required if BIC is provided (for SWIFT transfers).
              allOf:
                - $ref: '#/components/schemas/Address'
            capabilities:
              $ref: '#/components/schemas/Capabilities'
          required:
            - name
            - iban
            - account_holder_name
            - account_holder_address
            - bank_name
            - assets
            - capabilities
    IDResponse:
      type: object
      title: ID Response
      description: Response containing a unique identifier.
      required:
        - id
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
    DestinationResponseUnion:
      title: Destination Response Union
      description: Union type for different destination responses with destination_type discriminator
      oneOf:
        - $ref: '#/components/schemas/CryptoDestinationResponse'
        - $ref: '#/components/schemas/FiatUSDestinationResponse'
        - $ref: '#/components/schemas/FiatIBANDestinationResponse'
      discriminator:
        propertyName: destination_type
        mapping:
          crypto: '#/components/schemas/CryptoDestinationResponse'
          fiat_us: '#/components/schemas/FiatUSDestinationResponse'
          fiat_iban: '#/components/schemas/FiatIBANDestinationResponse'
    DestinationResponse:
      type: object
      title: Destination Response
      description: Base schema for destination responses with a discriminator based on destination type.
      required:
        - destination_id
        - destination_type
      properties:
        destination_id:
          $ref: '#/components/schemas/KSUID'
        destination_type:
          type: string
          description: The type of destination.
          enum:
            - crypto
            - fiat_us
            - fiat_iban
      discriminator:
        propertyName: destination_type
        mapping:
          crypto: '#/components/schemas/CryptoDestinationResponse'
          fiat_us: '#/components/schemas/FiatUSDestinationResponse'
          fiat_iban: '#/components/schemas/FiatIBANDestinationResponse'
    RecipientRequest:
      type: object
      title: Recipient Request
      description: |
        Request for creating or updating a recipient entity.

        **Address Requirements:**
        - **Optional** for crypto-only recipients (can be omitted or null)
        - **Required** before adding fiat destinations (ACH, Wire, SWIFT)

        **Migration Path:** Recipients created without addresses can be updated later to add an address when fiat capabilities are needed.
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the recipient entity
          example: Acme Corporation
        address:
          description: |
            Physical address of the recipient.
            - **Optional** when creating/updating crypto-only recipients
            - **Required** for recipients that will have fiat destinations (ACH, Wire, SWIFT)
            - Can be added later via PUT /recipients/{id} to enable fiat capabilities
          $ref: '#/components/schemas/Address'
    RecipientResponse:
      type: object
      title: Recipient Response
      description: Response containing recipient details.
      required:
        - id
        - name
        - status
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        name:
          type: string
          description: Name of the recipient entity.
          example: Acme Corporation
        address:
          $ref: '#/components/schemas/Address'
          nullable: true
          type: object
        status:
          type: string
          description: Current status of the recipient
          enum:
            - unused
            - active
            - frozen
          example: active
        destinations:
          type: array
          description: List of destinations associated with this recipient.
          items:
            $ref: '#/components/schemas/DestinationResponseUnion'
    CryptoDestinationResponse:
      type: object
      title: Crypto Destination Response
      description: Response for a crypto destination.
      allOf:
        - $ref: '#/components/schemas/DestinationResponse'
        - type: object
          required:
            - name
            - crypto_address
            - family
          properties:
            destination_type:
              type: string
              enum:
                - crypto
              default: crypto
            name:
              type: string
              description: Name of the destination for reference
              example: My Ethereum Wallet
            crypto_address:
              type: string
              description: Wallet address for the crypto account.
              example: '0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48'
            family:
              $ref: '#/components/schemas/Family'
            network_id:
              $ref: '#/components/schemas/NetworkId'
    FiatUSDestinationResponse:
      type: object
      title: US Fiat Destination Response
      description: Response for a US fiat destination.
      allOf:
        - $ref: '#/components/schemas/DestinationResponse'
        - type: object
          required:
            - account_holder_name
            - bank_name
            - bank_address
            - capabilities
            - aba_routing_number
            - account_number
            - account_type
          properties:
            destination_type:
              type: string
              enum:
                - fiat_us
              default: fiat_us
            name:
              type: string
              description: Name of the destination for reference
              example: Primary US Bank Account
            aba_routing_number:
              type: string
              description: ABA routing number for ACH transfers.
              example: '123456789'
            aba_wire_routing_number:
              type: string
              description: ABA routing number for wire transfers (optional).
              nullable: true
              example: '123456789'
            account_number:
              type: string
              description: Account number for the US bank account.
              example: '123456789'
            account_type:
              type: string
              description: Type of bank account.
              enum:
                - checking
                - savings
              example: checking
            account_holder_name:
              type: string
              description: Name of the account holder.
              example: John Doe
            account_holder_address:
              $ref: '#/components/schemas/Address'
            account_holder_phone:
              type: string
              description: Phone number of the account holder.
              example: '1234567890'
            bank_name:
              type: string
              description: Name of the bank.
              example: Bank of America
            bank_address:
              $ref: '#/components/schemas/Address'
            bank_phone:
              type: string
              description: Phone number of the bank.
              example: '1234567890'
            capabilities:
              $ref: '#/components/schemas/Capabilities'
    FiatIBANDestinationResponse:
      type: object
