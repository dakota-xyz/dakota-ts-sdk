  /sandbox/simulate/inbound:
    post:
      tags:
        - Sandbox
      summary: Simulate an inbound payment event
      description: |
        Triggers a simulated payment event through the mock Lead Bank provider.
        Accepted immediately; callbacks are delivered asynchronously.
        Idempotent: repeated calls with the same simulation_id and identical parameters
        return the original response. Conflicting parameters return 409.
      operationId: simulateInbound
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - simulation_id
                - type
                - amount
                - currency
                - account_id
              properties:
                simulation_id:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Unique ID for this simulation (used for idempotency)
                  example: sim_01H...
                type:
                  type: string
                  description: Payment rail and direction
                  enum:
                    - ach_inbound
                    - wire_inbound
                    - crypto_inbound
                    - ach_outbound_returned
                    - ach_outbound_failed
                    - wire_outbound_returned
                    - wire_outbound_failed
                    - ach_outbound_settled
                    - ach_outbound_rejected
                    - wire_outbound_settled
                    - wire_outbound_rejected
                    - ach_reversal
                    - wire_reversal
                  example: ach_inbound
                account_id:
                  type: string
                  description: Platform account ID (required for ach_inbound and wire_inbound types)
                  example: acc_123
                wallet_id:
                  type: string
                  description: Wallet ID (required for crypto_inbound type)
                  example: wallet_abc
                movement_id:
                  type: string
                  description: Movement ID (required for outbound types)
                  example: mov_456
                amount:
                  type: string
                  description: Amount as a decimal string
                  example: '100.00'
                currency:
                  type: string
                  description: Currency code
                  example: USD
                scenario:
                  type: string
                  description: |
                    Simulation scenario. Defaults to success_immediate.
                    - success_immediate: callbacks fire immediately
                    - success_delayed: callbacks fire after delay_seconds (default 30s)
                    For crypto_inbound: success_immediate | wrong_chain | unsupported_token |
                      address_mismatch | partial_crypto | unconfirmed
                  example: success_immediate
                partial_amount:
                  type: string
                  description: |
                    Amount actually received (for crypto_inbound with scenario=partial_crypto only).
                    Must be a valid decimal less than amount.
                  example: '50.00'
                delay_seconds:
                  type: integer
                  description: Delay in seconds for success_delayed scenario (1-86400)
                  minimum: 1
                  maximum: 86400
                  example: 30
                trace_id:
                  type: string
                  description: Optional trace ID for correlation
            example:
              simulation_id: sim_qa_run_001
              type: ach_inbound
              account_id: acc_123
              amount: '100.00'
              currency: USD
              scenario: success_immediate
      responses:
        '200':
          description: Simulation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulation_id:
                    type: string
                  state:
                    $ref: '#/components/schemas/SimulationState'
                  trace_id:
                    type: string
              example:
                simulation_id: sim_qa_run_001
                state: accepted
                trace_id: trace_abc123
        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#invalid-request
                title: Invalid request
                status: 400
                detail: Invalid request
                instance: https://api.platform.dakota.xyz/sandbox/simulate/inbound
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '403':
          description: Not available in production
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#forbidden
                title: Not available in production
                status: 403
                detail: Not available in production
                instance: https://api.platform.dakota.xyz/sandbox/simulate/inbound
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '404':
          description: Account not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#not-found
                title: Account not found
                status: 404
                detail: Account not found
                instance: https://api.platform.dakota.xyz/sandbox/simulate/inbound
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '409':
          description: Simulation ID conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#conflict
                title: Simulation ID conflict
                status: 409
                detail: Simulation ID conflict
                instance: https://api.platform.dakota.xyz/sandbox/simulate/inbound
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '502':
          description: Provider gRPC call failed
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
