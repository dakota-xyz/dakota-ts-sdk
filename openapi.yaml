        wallet_id:
          type: string
          description: Unique identifier for the wallet
        group_id:
          type: string
          description: The signer group id to be detached from the wallet
        idempotency_key:
          type: string
          description: A unique key to ensure idempotency of the request
    AttachPolicyToWalletIntent:
      type: object
      required:
        - type
        - wallet_id
        - policy_id
        - idempotency_key
      properties:
        type:
          type: string
          enum:
            - attach_policy_to_wallet
          example: attach_policy_to_wallet
        wallet_id:
          type: string
          description: Unique identifier for the wallet
          example: wal_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
        policy_id:
          type: string
          description: The policy id to be attached to the wallet
          example: pol_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
        idempotency_key:
          type: string
          description: A unique key to ensure idempotency of the request
          example: idem_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
    DetachPolicyFromWalletIntent:
      type: object
      required:
        - type
        - wallet_id
        - policy_id
        - idempotency_key
      properties:
        type:
          type: string
          enum:
            - detach_policy_from_wallet
          example: detach_policy_from_wallet
        wallet_id:
          type: string
          description: Unique identifier for the wallet
          example: wal_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
        policy_id:
          type: string
          description: The policy id to be detached from the wallet
          example: pol_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
        idempotency_key:
          type: string
          description: A unique key to ensure idempotency of the request
          example: idem_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
    AddPolicyRuleIntent:
      type: object
