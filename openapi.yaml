        type:
          type: string
          enum:
            - add_policy_rule
          example: add_policy_rule
        policy_id:
          type: string
          description: The policy id to which the rule will be added
          example: pol_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
        rule_type:
          type: string
