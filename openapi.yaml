  /webhooks:
    get:
      tags:
        - Webhooks
      summary: List webhook delivery history
      description: |
        Returns a paginated list of outbound webhook delivery records for your
        organization, newest first. Records are retained for 30 days. The date
        range filter (`from`/`to`) is silently clamped to the 30-day window.
      operationId: listWebhookHistory
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - delivered
              - failed
              - pending
          description: Filter by delivery status.
        - in: query
          name: event_type
          schema:
            type: string
          description: Filter by event type (e.g. `transaction.completed`).
        - in: query
          name: simulation_id
          schema:
            type: string
          description: Filter to deliveries that originated from a sandbox simulation.
        - in: query
          name: from
          schema:
            type: string
            format: date-time
          description: Return only records created at or after this timestamp (ISO 8601).
        - in: query
          name: to
          schema:
            type: string
            format: date-time
          description: Return only records created at or before this timestamp (ISO 8601).
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Maximum number of records to return per page.
        - in: query
          name: cursor
          schema:
            type: string
          description: Pagination cursor (event_id of the last item from the previous page).
      responses:
        '200':
          description: A paginated list of webhook delivery records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookHistoryList'
              example:
                data:
