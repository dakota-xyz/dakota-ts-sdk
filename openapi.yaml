        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the policy
          example: pol_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
        client_id:
          $ref: '#/components/schemas/KSUID'
        version:
          type: integer
          format: int32
          description: Version number of the policy (incremented on rule changes)
          example: 1
        name:
          type: string
          description: Human-readable name for the policy
          example: High Value Transaction Policy
        description:
          type: string
          description: Optional description of the policy's purpose
          example: Requires approval for transactions above $10,000
          nullable: true
        rules:
          type: array
          description: Rules that make up this policy
          items:
            $ref: '#/components/schemas/PolicyRule'
        created_at:
          type: integer
          description: Unix timestamp when the policy was created
          example: 1640995200
        updated_at:
          type: integer
          description: Unix timestamp when the policy was last updated
          example: 1640995200
    PolicyRule:
      type: object
      required:
        - id
        - policy_id
        - rule_type
        - action
        - definition
        - created_at
      properties:
        id:
          type: string
          description: Unique identifier for the rule (stable within the policy)
          example: rule_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
        policy_id:
          type: string
          description: Policy ID this rule belongs to
          example: pol_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
        rule_type:
          type: string
          description: Type of rule
          enum:
            - approval_threshold
            - amount_threshold
            - address_list
          example: amount_threshold
        action:
          type: string
          description: Action to take when rule matches
          enum:
            - allow
            - deny
          example: deny
        definition:
          type: object
          description: Rule-specific configuration as JSON
          example:
            amount: '10000'
            currency: USD
        created_at:
          type: integer
          description: Unix timestamp when the rule was created
          example: 1640995200
    CreatePolicyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Human-readable name for the policy
          example: High Value Transaction Policy
        description:
          type: string
          description: Optional description of the policy's purpose
          example: Requires approval for transactions above $10,000
          nullable: true
        signer_group_id:
          type: string
          description: ID of the signer group to associate with this policy
          example: grp_2N4YkKpKu7M3mKpGYmF8kcJ8oZT
          nullable: true
        rules:
          type: array
          description: Initial rules for this policy
          items:
            $ref: '#/components/schemas/CreatePolicyRuleRequest'
    CreatePolicyRuleRequest:
      type: object
      required:
        - rule_type
        - action
        - definition
      properties:
        rule_type:
          type: string
          description: Type of rule
          enum:
            - approval_threshold
            - amount_threshold
            - address_list
          example: amount_threshold
        action:
          type: string
          description: Action to take when rule matches
          enum:
            - allow
            - deny
          example: deny
        definition:
          type: object
          description: Rule-specific configuration as JSON
          example:
            amount: '10000'
            currency: USD
    EndorsedRequest:
      type: object
      required:
        - signatures
        - intent
      properties:
        signatures:
          type: array
          description: List of signatures over the intent
          items:
            type: string
            description: Cryptographic signature of the endorsement base64 encoded
            example: LS0tLS1CRUdJ...0tLS0tCg==
        intent:
          oneOf:
            - $ref: '#/components/schemas/SendTransactionIntent'
            - $ref: '#/components/schemas/AttachGroupToWalletIntent'
            - $ref: '#/components/schemas/DetachGroupFromWalletIntent'
            - $ref: '#/components/schemas/AttachPolicyToWalletIntent'
            - $ref: '#/components/schemas/DetachPolicyFromWalletIntent'
            - $ref: '#/components/schemas/AddPolicyRuleIntent'
            - $ref: '#/components/schemas/RemovePolicyRuleIntent'
            - $ref: '#/components/schemas/UpdatePolicyRuleIntent'
            - $ref: '#/components/schemas/DeletePolicyIntent'
          description: The intent being endorsed
    SendTransactionIntent:
      type: object
      required:
        - wallet_id
        - caip2
        - operation
        - idempotency_key
      properties:
        wallet_id:
          type: string
          description: Unique identifier for the wallet
        caip2:
          type: string
          description: CAIP-2 chain identifier for the target blockchain network
        operation:
          $ref: '#/components/schemas/TransactionOperation'
        idempotency_key:
          type: string
          description: A unique key to ensure idempotency of the request
    TransactionOperation:
      type: object
      required:
        - kind
        - from
        - to
        - asset_id
      properties:
        kind:
          type: string
          description: 'Transaction type: transfer or contract call'
        from:
          type: string
          description: The wallet address initiating the transaction
        to:
          type: string
          description: The recipient address of the transaction
        amount:
          type: string
          description: Amount to be transferred (for transfer operations)
        asset_id:
          type: string
          description: Crypto asset symbol for the transfer or contract call.
          example: USDC
        method:
          type: string
          description: The method name to be invoked on the contract
        args:
          type: array
          description: Arguments for the contract method call
          items:
            type: string
        data:
          type: string
          description: The calldata payload for the contract call
    CreateSignerGroupSignerRequest:
      type: object
      required:
        - member_key
      properties:
        member_key:
          type: string
          description: Public key of the member to add to the signer group.
    AttachGroupToWalletIntent:
