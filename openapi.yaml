        file_type:
          type: string
          description: File type (pdf, jpeg, png)
          example: pdf
        status:
          type: string
          enum:
            - pending_verification
            - uploaded
          description: Upload status of the document
          example: uploaded
        original_filename:
          type: string
          description: Original filename if provided
          example: certificate.pdf
        individual_id:
          type: string
          description: Individual ID (only for identity documents)
          example: 2hCjxJzUAW6JVRkZqaF9E0KpM3a
        individual_first_name:
          type: string
          description: Individual's first name (only for identity documents)
          example: John
        individual_last_name:
          type: string
          description: Individual's last name (only for identity documents)
          example: Doe
        created_at:
          type: string
          format: date-time
          description: When the document was uploaded
          example: '2025-01-15T10:30:00Z'
    UploadedDocument:
