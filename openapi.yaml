    BusinessApplicationCreateRequest:
      type: object
      required:
        - legal_name
        - country_of_incorporation
        - date_of_incorporation
        - legal_structure
        - registration_number
        - registered_address
        - industry_code
        - business_description
        - purpose_of_account
        - average_monthly_revenue
        - expected_monthly_deposit
        - expected_monthly_transaction_volume
        - source_of_funds
        - has_bearer_shares
        - transact_on_behalf_of_third_parties
        - owned_by_foundation
      properties:
        legal_name:
          type: string
          description: Legal name of the business entity
          example: Acme Corporation
        country_of_incorporation:
          type: string
          description: ISO 3166-1 alpha-2 country code where the business is incorporated
          minLength: 2
          maxLength: 2
          example: US
        date_of_incorporation:
          type: string
          format: date
          description: Date when the business was incorporated (ISO 8601 format)
          example: '2020-01-15'
        legal_structure:
          type: string
          description: 'Legal entity type of the business. Note: trust, government_entity, and sole_proprietorship are not eligible for onboarding.'
          enum:
            - corporation
            - llc
            - general_partnership
            - llp
            - non_profit_foundation
            - trust
            - government_entity
            - sole_proprietorship
          example: llc
        tax_id_number:
          type: string
          description: Tax identification number (required for US entities)
          example: 12-3456789
        registration_number:
          type: string
          description: Business registration number
          example: '123456789'
        dba:
          type: string
          description: Doing Business As name
          example: Acme Inc
        registered_address:
          $ref: '#/components/schemas/Address'
        operating_address:
          $ref: '#/components/schemas/Address'
        website:
          type: string
          description: Business website URL
          example: https://www.acme.com
        business_email:
          type: string
          format: email
          description: Primary business contact email address
          example: contact@acmecorp.com
        industry_code:
          type: string
          description: Industry classification code (NAICS or crypto)
          example: '541511'
        business_description:
          type: string
          description: Detailed description of the business activities
          example: Software development and technology consulting services
        purpose_of_account:
          type: array
          description: Intended purposes for the account (at least one required)
          minItems: 1
          items:
            type: string
            enum:
              - operating_otc_service
              - accepting_donations
              - payment_processing_platform
              - third_party_payments
              - first_party_payments
              - proprietary_trading
              - business_expenses
              - storage_of_funds_or_assets
          example:
            - first_party_payments
            - business_expenses
        average_monthly_revenue:
          type: string
          description: Expected average monthly revenue range
          enum:
            - 0_to_500k
            - 500k_to_1m
            - 1m_to_5m
            - 5m_to_10m
            - 10m_to_50m
            - 50m_to_100m
            - 100m_plus
          example: 1m_to_5m
        expected_monthly_deposit:
          type: string
          description: Expected monthly deposit range
          enum:
            - 0_to_50k
            - 50k_to_100k
            - 100k_to_500k
            - 500k_to_1m
            - 1m_to_5m
            - 5m_to_10m
            - 10m_to_20m
            - 20m_to_50m
            - 50m_plus
          example: 100k_to_500k
        expected_monthly_transaction_volume:
          type: string
          description: Expected monthly transaction volume range
          enum:
            - 0_to_10
            - 10_to_20
            - 20_to_50
            - 50_to_100
            - 100_to_250
            - 250_to_500
            - 500_plus
          example: 50_to_100
        source_of_funds:
          type: array
          description: Sources of funds for the business (at least one required)
          minItems: 1
          items:
            type: string
            enum:
              - ico_token_sale
              - donations
              - loan_funding
              - crowdfunding
              - proprietary_funds
              - sale_of_goods_and_services
              - investments
              - sale_of_assets
              - customer_funds
              - grants
              - intercompany_transfer
          example:
            - proprietary_funds
            - customer_funds
        has_bearer_shares:
          type: boolean
          description: Whether the company issues bearer shares
          example: false
        transact_on_behalf_of_third_parties:
          type: boolean
          description: Whether the business will transact (trading or transmitting funds) on behalf of third parties. Triggers EDD requirement if true.
          example: false
        owned_by_foundation:
          type: boolean
          description: Whether the business is owned by a foundation
          example: false
    IndividualRequest:
      type: object
      description: An individual person (used for both business associated persons and standalone individual applications)
      required:
        - roles
        - name
        - date_of_birth
        - nationalities
        - address
        - email_address
      properties:
        roles:
          type: array
          description: Role(s) of this person (individual cannot be combined with other types)
          minItems: 1
          items:
            type: string
            enum:
              - ubo
              - control_person
              - applicant
              - individual
          example:
            - ubo
            - control_person
        name:
          $ref: '#/components/schemas/PersonName'
        title:
          type: string
          description: Job title (required for UBO/control person, optional for applicant, invalid for individual)
          enum:
            - ceo
            - coo
            - cfo
            - cto
            - cco
            - director
            - other_officer
          example: ceo
        employment_status:
          type: string
          description: Employment status (required only when roles includes 'individual')
          enum:
            - employed
            - self_employed
            - unemployed
            - student
            - retired
          example: employed
        ownership_percentage:
          type: number
          format: double
          description: Ownership percentage (required for UBO role, optional for others, must be > 0 and <= 100)
          minimum: 0.01
          maximum: 100
          example: 25.5
        date_of_birth:
          type: string
          format: date
          description: Date of birth (ISO 8601 format, person must be at least 18 years old)
          example: '1985-06-15'
        ssn:
          type: string
          description: 'Social Security Number (required for US persons, format: XXX-XX-XXXX)'
          pattern: ^\d{3}-\d{2}-\d{4}$
          example: 123-45-6789
        nationalities:
          type: array
          description: ISO 3166-1 alpha-2 country codes for nationalities
          minItems: 1
          items:
            type: string
            minLength: 2
            maxLength: 2
          example:
            - US
        address:
          $ref: '#/components/schemas/Address'
        email_address:
          type: string
          format: email
          description: Email address (cannot use example or test domains)
          example: john.doe@acme.com
        purpose_of_account:
          type: array
          description: Intended purposes for the account (required when roles includes 'individual')
          minItems: 1
          items:
            type: string
            enum:
              - investing
              - sending_and_receiving_payments
              - storage_of_funds_or_digital_assets
              - making_online_payments
              - trading_on_other_platforms
          example:
            - investing
            - storage_of_funds_or_digital_assets
        source_of_wealth:
          type: array
          description: Sources of wealth (required when roles includes 'individual')
          minItems: 1
          items:
            type: string
            enum:
              - investments
              - employment
              - court_settlement
              - lottery_winnings
              - retirement_income
              - savings
              - sale_of_assets
              - family_funds
              - gambling_winnings
              - gift
              - inheritance
              - insurance_claim
              - loan
              - redundancy_severance
              - benefits
          example:
            - employment
            - savings
    PersonName:
      type: object
      description: Full name of a person
      required:
        - first
        - last
      properties:
        first:
          type: string
          description: First name
          example: John
        middle:
          type: string
          description: Middle name (optional)
          example: Michael
        last:
          type: string
          description: Last name
          example: Doe
    ApplicationDocumentType:
