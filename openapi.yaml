        txnHash:
          type: string
          description: Transaction hash for crypto transactions.
          nullable: true
        imad:
          type: string
          description: Input Message Accountability Data for certain US transactions.
          nullable: true
        omad:
          type: string
          description: Output Message Accountability Data for certain US transactions.
          nullable: true
    NestedTransaction:
      type: object
      description: A transaction object for use within composite transactions (without further nesting).
      required:
        - id
        - type
        - status
        - description
        - inputAmount
        - subtotalAmount
        - convertedAmount
        - outputAmount
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        description:
          type: string
        inputAmount:
          $ref: '#/components/schemas/TransactionAmount'
          description: The amount of money input into the transaction.
        subtotalAmount:
          $ref: '#/components/schemas/TransactionAmount'
          description: TODO @Marc what does this mean specifically?
        convertedAmount:
          $ref: '#/components/schemas/TransactionAmount'
          description: TODO @Marc what does this mean specifically?
        outputAmount:
          $ref: '#/components/schemas/TransactionAmount'
          description: The amount of money output from the transaction.
        settlement:
          $ref: '#/components/schemas/TransactionSettlement'
        createdAt:
          type: integer
          description: Unix timestamp when the transaction was created.
          example: 1234567890
        updatedAt:
          type: integer
          description: Unix timestamp when the transaction was last updated.
          example: 1234567890
        completedAt:
          type: integer
          description: Unix timestamp when the transaction was completed. Null if not completed.
          nullable: true
          example: 1234567890
    WebhookDelivery:
      type: object
      description: A single outbound webhook delivery record.
      required:
        - id
        - event_type
        - endpoint_url
        - status
        - attempts
        - created_at
        - is_replay
      properties:
        id:
          type: string
          description: The event ID for this delivery (KSUID).
        event_type:
          type: string
          description: The event type (e.g. `transaction.completed`).
        endpoint_url:
          type: string
          description: The target URL this webhook was sent to.
        status:
          type: string
          enum:
            - delivered
            - failed
            - pending
          description: Current delivery status.
        attempts:
          type: integer
          description: Number of delivery attempts made so far.
        created_at:
          type: string
          format: date-time
          description: When this delivery record was created.
        delivered_at:
          type: string
          format: date-time
          nullable: true
          description: When the webhook was successfully delivered, if applicable.
        simulation_id:
          type: string
          nullable: true
          description: Present if this webhook originated from a sandbox simulation.
        is_replay:
          type: boolean
          description: True if this delivery was triggered by a manual replay.
        replay_count:
          type: integer
          description: Number of times this delivery has been replayed (max 10).
        payload:
          type: object
          additionalProperties: true
          nullable: true
          description: The full event payload sent in the webhook body.
    WebhookHistoryList:
      type: object
      description: A paginated list of webhook delivery records.
      required:
        - data
        - has_more
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebhookDelivery'
        has_more:
          type: boolean
          description: True when additional results exist past this page.
        cursor:
          type: string
          nullable: true
          description: Pass as `cursor` query parameter to fetch the next page.
    WebhookReplayResponse:
      type: object
      description: Response returned after successfully queuing a webhook for replay.
      required:
        - webhook_id
        - status
        - replayed_to_count
      properties:
        webhook_id:
          type: string
          description: The event ID of the webhook that was replayed.
        status:
          type: string
          enum:
            - queued
          description: Always `queued`; the delivery will be processed by the next cron tick.
        replayed_to_count:
          type: integer
          description: Number of webhook targets this replay was queued for.
    WebhookTarget:
      type: object
      description: A webhook target for receiving outbound webhook events
      required:
        - id
        - url
        - global
        - time_last_healthy
        - time_last_attempted
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        url:
          type: string
          format: uri
          description: The URL where webhook events will be sent
          example: https://example.com/webhooks/receive
        global:
          type: boolean
          description: If true, this target will receive all event types
          example: false
        event_types:
          type: array
          description: List of event types this target cares about (ignored if global is true)
          items:
            $ref: '#/components/schemas/EventType'
        time_last_healthy:
          type: integer
          description: Unix timestamp when this target last received a successful delivery (defaults to creation time if never healthy)
        time_last_attempted:
          type: integer
          description: Unix timestamp when a delivery to this target was last attempted (defaults to creation time if never attempted)
    WebhookTargetCreateRequest:
      type: object
      description: Request to create a new webhook target
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: The URL where webhook events will be sent
          example: https://example.com/webhooks/receive
        global:
          type: boolean
          description: If true, this target will receive all event types
          example: false
          default: false
        event_types:
          type: array
          description: List of event types this target cares about (ignored if global is true)
          items:
            $ref: '#/components/schemas/EventType'
    WebhookTargetUpdateRequest:
      type: object
      description: Request to update an existing webhook target
      properties:
        global:
          type: boolean
          description: If true, this target will receive all event types
          example: false
        event_types:
          type: array
          description: List of event types this target cares about (ignored if global is true)
          items:
            $ref: '#/components/schemas/EventType'
    AutoAccountTransaction:
      type: object
      description: A transaction relating to an auto account
      required:
        - id
        - client_id
        - auto_account_id
        - destination_id
        - type
        - provider_id
        - provider_external_id
        - provider_status
        - status
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        client_id:
          $ref: '#/components/schemas/KSUID'
        auto_account_id:
          $ref: '#/components/schemas/KSUID'
        destination_id:
          $ref: '#/components/schemas/KSUID'
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        failure_reason:
          type: string
          description: Reason for failure if status is 'failed'
        created_at:
          type: integer
          description: Unix timestamp when the transaction was created.
          example: 1234567890
        updated_at:
          type: integer
          description: Unix timestamp when the transaction was last updated.
          example: 1234567890
        completed_at:
          type: integer
          description: Unix timestamp when the transaction was completed.
          example: 1234567890
        receipt:
          $ref: '#/components/schemas/TransactionReceipt'
        crypto_details:
          $ref: '#/components/schemas/TransactionCryptoDetails'
        provider_id:
          type: string
          description: Provider identifier
          example: dakota
        provider_external_id:
          type: string
          description: Provider external transaction identifier
          example: txn_123456789
        provider_status:
          type: string
          description: Status reported by provider
          example: processing
    AmountDetails:
      type: object
      description: Detailed representation of an amount with its asset and optional metadata
      required:
        - amount
        - asset
      properties:
        amount:
          type: string
          description: Amount as a string representation of a decimal number
        asset:
          type: string
          description: Asset code
        network:
          type: string
          description: Network identifier for the token if it is a crypto asset
    TransactionReceipt:
      type: object
      description: Detailed receipt information for a transaction
      required:
        - input
        - output
        - exchange_rate
      properties:
        imad:
          type: string
          description: Input Message Accountability Data for certain US transactions.
        omad:
          type: string
          description: Input Message Accountability Data for certain US transactions.
        input:
          $ref: '#/components/schemas/AmountDetails'
          description: Input amount details
        subtotal:
          $ref: '#/components/schemas/AmountDetails'
          description: Subtotal amount after fees
        converted:
          $ref: '#/components/schemas/AmountDetails'
          description: Converted amount after applying the exchange rate
        output:
          $ref: '#/components/schemas/AmountDetails'
          description: Output amount details
        exchange_rate:
          type: string
          description: Exchange rate used for the transaction
        external_fee:
          $ref: '#/components/schemas/AmountDetails'
          description: External fee amount details
        dakota_fee:
          $ref: '#/components/schemas/AmountDetails'
          description: Dakota fee amount details
        client_fee:
          $ref: '#/components/schemas/AmountDetails'
          description: Client fee amount details
        gas_fee:
          $ref: '#/components/schemas/AmountDetails'
          description: Gas fee amount details for blockchain transactions
        payment_reference:
          type: string
          description: Payment reference message for bank transfers
          nullable: true
          example: Invoice payment for services
    TransactionCryptoDetails:
      type: object
      description: Blockchain-specific details for crypto transactions
      properties:
        source_crypto_address:
          type: string
          description: Source blockchain address
        source_network_id:
          $ref: '#/components/schemas/NetworkId'
        destination_crypto_address:
          type: string
          description: Destination blockchain address
        destination_network_id:
          $ref: '#/components/schemas/NetworkId'
        deposit_transaction_hash:
          type: string
          description: Transaction hash for intermediate transaction, such as the first half of an offramp or two-part swap
        transaction_hash:
          type: string
          description: Transaction hash for main transaction that reaches the recipient, if applicable
    PaginatedAutoTransactionResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedListResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/AutoAccountTransaction'
    OneOffTransactionType:
      type: string
      description: Transaction type for one-off transaction creation.
      enum:
        - one_off
      example: one_off
    OneOffTransactionRequest:
      type: object
      description: Request to create a one-off offramp transaction
      required:
        - amount
        - customer_id
        - source_network_id
        - source_asset
        - destination_id
        - destination_asset
      properties:
        transaction_type:
          $ref: '#/components/schemas/OneOffTransactionType'
        amount:
          type: string
          description: Amount to transfer as a decimal string
          example: '1.23'
          pattern: ^[0-9]+(\.[0-9]+)?$
          minLength: 1
        customer_id:
          $ref: '#/components/schemas/KSUID'
        source_network_id:
          $ref: '#/components/schemas/NetworkId'
        source_asset:
          type: string
          description: Source crypto asset symbol
          example: USDC
        destination_id:
          $ref: '#/components/schemas/KSUID'
        destination_network_id:
          $ref: '#/components/schemas/NetworkId'
        destination_asset:
          type: string
          description: Destination fiat currency
          example: USD
        destination_payment_rail:
          $ref: '#/components/schemas/PaymentCapability'
          description: Optional preferred payment rail for bank transfers. If not specified, the system will automatically select the most appropriate rail based on the destination's supported methods.
        payment_reference:
          type: string
          description: 'Optional payment reference message for bank transfers. Length limits: ACH (1-10 chars), Wire (1-140 chars), SEPA (6-140 chars), SWIFT (1-140 chars, max 4 lines of 35 chars each)'
          minLength: 1
          maxLength: 140
          example: Invoice payment for services
    OneOffTransaction:
      type: object
      description: A one-off transaction response
      required:
        - id
        - customer_id
        - crypto_address
        - status
        - source_network_id
        - source_asset
        - destination_id
        - destination_asset
        - created_at
        - updated_at
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        customer_id:
          $ref: '#/components/schemas/KSUID'
        crypto_address:
          type: string
          description: Temporary address where funds should be sent
          example: '0x1234567890abcdef1234567890abcdef12345678'
        send_amount:
          type: string
          description: Amount that should be sent (may be higher than requested amount due to fees)
          example: '1.24'
        status:
          $ref: '#/components/schemas/OneOffTransactionStatus'
        amount:
          type: string
          description: Original requested amount
          example: '1.23'
        source_network_id:
          $ref: '#/components/schemas/NetworkId'
        source_asset:
          type: string
          description: Source crypto asset symbol
          example: USDC
        destination_id:
          $ref: '#/components/schemas/KSUID'
        destination_asset:
          $ref: '#/components/schemas/Asset'
        failure_reason:
          type: string
          description: Reason for failure if status is failed
        receipt:
          $ref: '#/components/schemas/TransactionReceipt'
          nullable: true
          type: object
        crypto_details:
          $ref: '#/components/schemas/TransactionCryptoDetails'
          nullable: true
          type: object
        created_at:
          type: integer
          description: Unix timestamp when the transaction was created
          example: 1234567890
        updated_at:
          type: integer
          description: Unix timestamp when the transaction was last updated
          example: 1234567890
        completed_at:
          type: integer
          description: Unix timestamp when the transaction was completed
          example: 1234567890
        destination_payment_rail:
          $ref: '#/components/schemas/PaymentCapability'
          description: The payment rail that was selected for this transaction
          nullable: true
          type: string
        payment_reference:
          type: string
          description: Payment reference message for bank transfers (e.g. wire message, SWIFT or SEPA reference)
          nullable: true
        destination_bank_name:
          type: string
          description: Name of the destination bank
          example: Chase Bank
        destination_account_holder_name:
          type: string
          description: Name of the account holder at the destination bank
          example: Acme Corporation
        destination_account_number_last_four:
          type: string
          description: Last four digits of the destination account number
          example: '6789'
        destination_routing_number:
          type: string
          description: ABA routing number for US bank accounts
          example: '021000021'
        destination_iban:
          type: string
          description: IBAN for international bank accounts
          example: GB82WEST12345698765432
        destination_bic:
          type: string
          description: BIC/SWIFT code for international transfers
          example: BARCGB22XXX
    OneOffTransactionStatus:
      type: string
      description: Status of a one-off transaction
      enum:
        - pending
        - processing
        - completed
        - failed
        - cancelled
        - reversed
        - pending_return
        - returned
      example: pending
    PaginatedOneOffTransactionResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedListResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/OneOffTransaction'
    Wallet:
