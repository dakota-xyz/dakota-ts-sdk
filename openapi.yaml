  /wallets/{wallet_id}/transactions:
    post:
      tags:
        - Wallets
      summary: Send a transaction from a wallet
      description: Creates a new outbound transaction from the specified wallet. Policy and signer checks may affect the resulting transaction state.
      operationId: createWalletTransaction
      parameters:
        - name: wallet_id
          in: path
          required: true
          description: Wallet ID
          schema:
            $ref: '#/components/schemas/KSUID'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndorsedRequest'
            example:
              signatures:
                - LS0tLS1CRUdJ...0tLS0tCg==
              intent:
                wallet_id: string
                caip2: string
                operation:
                  kind: string
                  from: string
                  to: string
                  amount: string
                  asset_id: USDC
                  method: string
                  args:
                    - string
                  data: string
                idempotency_key: string
      responses:
        '200':
          description: Transaction sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletTransaction'
              example:
                id: 1NFHrqBHb3cTfLVkFSGmHZqdDPi
                wallet_id: 1NFHrqBHb3cTfLVkFSGmHZqdDPi
                network_id: ethereum-mainnet
                from: string
                to: string
                transaction_hash: '0x165cd37b4c644c2921454429e7f9358d18a45e14'
                transaction_type: transfer
                amount: '100.56'
                asset: USD
                status: timed_out
        '400':
          description: Bad request - invalid input data
