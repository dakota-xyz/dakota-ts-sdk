          description: List of required documents that haven't been uploaded yet
          items:
            $ref: '#/components/schemas/MissingDocument'
    ApplicationEntity:
      type: object
      description: An entity (business or individual) associated with an application, including document status
      required:
        - applicant_type
        - applicant_id
        - document_info
        - ready
      properties:
        applicant_type:
          type: string
          description: Type of applicant
          enum:
            - business
            - individual
          example: individual
        applicant_id:
          type: string
          format: ksuid
          description: ID of the business or individual
          example: 2hCjxJzUAW6JVRkZqaF9E0KpM3a
        legal_name:
          type: string
          description: Legal name (present when applicant_type = business)
          example: Acme Corporation
        first_name:
          type: string
          description: First name (present when applicant_type = individual)
          example: John
        last_name:
          type: string
          description: Last name (present when applicant_type = individual)
          example: Doe
        ready:
          type: boolean
          description: Whether this applicant has met all document requirements
          example: true
        document_info:
          $ref: '#/components/schemas/DocumentInfo'
    EDDInfo:
      type: object
      description: Enhanced Due Diligence information for business applications
      required:
        - required
        - ready
        - document_info
      properties:
        required:
          type: boolean
          description: Whether EDD is required for this application
          example: true
        edd_id:
          type: string
          description: EDD record ID (null if EDD information not yet provided)
          nullable: true
          example: 2KPQgUCj09jSdGSdYMqaS3Z3C8r
        ready:
          type: boolean
          description: Whether EDD is complete (both form fields and documents)
          example: false
        document_info:
          $ref: '#/components/schemas/DocumentInfo'
    RiskRating:
      type: object
      description: Risk rating assessment for an application
      required:
        - score
        - num_factors
        - percentage
        - level
        - factors
        - edd_required
        - prohibited
        - version
        - calculated_at
        - data_version
        - config
      properties:
        score:
          type: integer
          description: Sum of all factor values
          example: 7
        num_factors:
          type: integer
          description: Number of factors evaluated
          example: 4
        percentage:
          type: number
          format: double
          description: Risk percentage (0-100)
          example: 62.5
        level:
          type: string
          description: Risk level classification
          enum:
            - low
            - medium
            - high
          example: high
        factors:
          type: array
          description: Detailed breakdown of risk factors
          items:
            type: object
            required:
              - name
              - value
              - level
              - input
              - description
              - reason
              - prohibited
            properties:
              name:
                type: string
                description: Factor name (e.g., 'country_risk', 'industry_risk')
                example: country_risk
              value:
                type: integer
                description: Risk factor value (1=low, 2=medium, 3=high)
                enum:
                  - 1
                  - 2
                  - 3
                example: 3
              level:
                type: string
                description: Risk level for this factor
                enum:
                  - low
                  - medium
                  - high
                example: high
              input:
                type: string
                description: Actual input value (country code, NAICS, etc.)
                example: US
              description:
                type: string
                description: Human-readable description of the factor
                example: Country risk based on incorporation country
              reason:
                type: string
                description: Explanation for this risk level
                example: United States is a low-risk jurisdiction
              prohibited:
                type: boolean
                description: Whether this factor value is prohibited
                example: false
        edd_required:
          type: boolean
          description: Whether Enhanced Due Diligence is required (true if level is high)
          example: true
        prohibited:
          type: boolean
          description: Whether this entity is prohibited from onboarding (true if any factor is prohibited)
          example: false
        prohibited_reason:
          type: string
          description: Reason for prohibition if prohibited is true
          example: Sanctioned country
        version:
          type: string
          description: Risk rating calculation version
          example: v1
        data_version:
          type: string
          description: Risk data version (which CSV files were used)
          example: '2026-01-07'
        config:
          $ref: '#/components/schemas/RiskConfig'
        calculated_at:
          type: string
          format: date-time
          description: When the risk rating was calculated
          example: '2024-01-15T10:30:00Z'
    RiskConfig:
      type: object
      description: Configuration parameters used during risk calculation
      required:
        - threshold_low
        - threshold_high
      properties:
        threshold_low:
          type: number
          format: double
          description: Low to medium risk threshold percentage
          example: 25
        threshold_high:
          type: number
          format: double
          description: Medium to high risk threshold percentage
          example: 50
    BusinessEntity:
      type: object
      description: Business entity data (entity information only, no validation)
      required:
        - id
        - legal_name
        - country_of_incorporation
        - date_of_incorporation
        - legal_structure
        - registration_number
        - registered_address
        - industry_code
        - business_description
        - purpose_of_account
        - average_monthly_revenue
        - expected_monthly_deposit
        - expected_monthly_transaction_volume
        - source_of_funds
      properties:
        id:
          type: string
          format: ksuid
          description: Business applicant identifier (this is the applicant_id, NOT the internal business entity ID)
          example: 2hCjxJzUAW6JVRkZqaF9E0KpM3a
        legal_name:
          type: string
          description: Legal name of the business entity
          example: Acme Corporation
        country_of_incorporation:
          type: string
          description: ISO 3166-1 alpha-2 country code where the business is incorporated
          minLength: 2
          maxLength: 2
          example: US
        date_of_incorporation:
          type: string
          format: date
          description: Date when the business was incorporated
          example: '2020-01-15'
        legal_structure:
          type: string
          description: Legal entity type of the business
          enum:
            - corporation
            - llc
            - general_partnership
            - llp
            - non_profit_foundation
            - trust
            - government_entity
            - sole_proprietorship
          example: llc
        registration_number:
          type: string
          description: Business registration number
          example: '123456789'
        tax_id_number:
          type: string
          description: Tax identification number (optional, required for US entities)
          example: 12-3456789
        dba:
          type: string
          description: Doing Business As name (optional)
          example: Acme Inc
        registered_address:
          $ref: '#/components/schemas/Address'
          description: Registered business address
        operating_address:
          $ref: '#/components/schemas/Address'
          description: Operating business address (optional, if different from registered)
        industry_code:
          type: string
          description: Industry classification code (NAICS or crypto code)
          example: '541511'
        business_description:
          type: string
          description: Detailed description of business activities
          example: Software development and technology consulting services
        purpose_of_account:
          type: array
          description: Intended purposes for the account
          items:
            type: string
          example:
            - first_party_payments
            - business_expenses
        average_monthly_revenue:
          type: string
          description: Expected average monthly revenue range
          example: 1_to_10m
        expected_monthly_deposit:
          type: string
          description: Expected monthly deposit range
          example: 100k_to_500k
        expected_monthly_transaction_volume:
          type: string
          description: Expected monthly transaction volume range
          example: 0_to_10
        source_of_funds:
          type: array
          description: Sources of funds for the business
          items:
            type: string
          example:
            - proprietary_funds
            - customer_funds
        has_bearer_shares:
          type: boolean
          description: Whether the company issues bearer shares
          example: false
        transact_on_behalf_of_third_parties:
          type: boolean
          description: Whether the business will transact (trading or transmitting funds) on behalf of third parties. Triggers EDD requirement if true.
          example: false
        owned_by_foundation:
          type: boolean
          description: Whether the business is owned by a foundation
          example: false
        website:
          type: string
          format: uri
          description: Business website URL (optional)
          example: https://www.acme.com
        business_email:
          type: string
          format: email
          description: Primary business contact email address (optional)
          example: contact@acmecorp.com
        decision:
          type: string
          enum:
            - approved
            - declined
            - auto_declined
            - withdrawn
          nullable: true
          description: Decision on this business entity (if made)
          example: approved
        decision_reason:
          type: string
          nullable: true
          description: Reason for the decision
          example: All verification checks passed
        decision_by:
          type: string
          nullable: true
          description: Email of admin who made the decision
          example: admin@dakota.xyz
        decision_at:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp when decision was made
          example: 1705315800
        sumsub_verification:
          $ref: '#/components/schemas/SumsubReviewData'
          description: Sumsub verification data for this business entity
