            iban:
              type: string
              description: IBAN (International Bank Account Number) for the account.
              example: DE89370400440532013000
            bic:
              type: string
              description: BIC/SWIFT code for the international bank account (optional for SEPA, required for SWIFT).
              example: DEUTDEFFXXX
            account_holder_name:
              type: string
              description: Name of the account holder.
              example: John Doe
            account_holder_address:
              $ref: '#/components/schemas/Address'
            account_holder_phone:
              type: string
              description: Phone number of the account holder.
              example: '1234567890'
            bank_name:
              type: string
              description: Name of the bank.
              example: Deutsche Bank
            bank_address:
              $ref: '#/components/schemas/Address'
            capabilities:
              $ref: '#/components/schemas/Capabilities'
    Transaction:
      type: object
      description: A unified transaction object representing money movements in the Dakota platform.
      required:
        - id
        - type
        - status
        - description
        - inputAmount
        - subtotalAmount
        - convertedAmount
        - outputAmount
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        description:
          type: string
          description: Human-readable description of the transaction.
          example: USD to ETH conversion
        inputAmount:
          $ref: '#/components/schemas/TransactionAmount'
          description: The amount of money input into the transaction.
        subtotalAmount:
          $ref: '#/components/schemas/TransactionAmount'
          description: TODO @Marc what does this mean specifically?
        convertedAmount:
          $ref: '#/components/schemas/TransactionAmount'
          description: TODO @Marc what does this mean specifically?
        outputAmount:
          $ref: '#/components/schemas/TransactionAmount'
          description: The amount of money output from the transaction.
        settlement:
          $ref: '#/components/schemas/TransactionSettlement'
        components:
          type: array
          description: List of component transactions for composite transactions.
          items:
            $ref: '#/components/schemas/NestedTransaction'
          nullable: true
        createdAt:
          type: integer
          description: Unix timestamp when the transaction was created.
          example: 1234567890
        updatedAt:
          type: integer
          description: Unix timestamp when the transaction was last updated.
          example: 1234567890
        completedAt:
          type: integer
          description: Unix timestamp when the transaction was completed. Null if not completed.
          nullable: true
          example: 1234567890
    TransactionResource:
      oneOf:
        - $ref: '#/components/schemas/OneOffTransaction'
        - $ref: '#/components/schemas/WalletTransaction'
        - $ref: '#/components/schemas/Transaction'
    PaginatedCustomerTransactionResponse:
      allOf:
        - $ref: '#/components/schemas/PaginatedListResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Transaction'
    PaginatedTransactionResourceResponse:
      oneOf:
        - $ref: '#/components/schemas/PaginatedOneOffTransactionResponse'
        - $ref: '#/components/schemas/PaginatedCustomerTransactionResponse'
    TransactionAmount:
      type: object
      description: An amount of money with its asset.
      required:
        - amount
        - asset
      properties:
        amount:
          type: string
          description: The amount as a decimal string.
          example: '1000.00'
        asset:
          type: string
          description: The asset code or asset symbol.
          example: USD
    TransactionSettlement:
      type: object
      description: Settlement details for a transaction.
