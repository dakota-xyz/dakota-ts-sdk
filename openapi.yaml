        url: https://docs.dakota.xyz/api-reference/sandbox/simulate-an-inbound-payment-event
  /sandbox/simulate/onboarding:
    post:
      tags:
        - Sandbox
      summary: Simulate an onboarding state transition
      description: |
        Drives KYB, KYC, or applicant account status through a sandbox transition
        without waiting for real compliance review. Available in sandbox mode only.

        **Type → effect mapping:**

        | type | KYB status set | Application status set | webhook emitted |
        |---|---|---|---|
        | `kyb_approve` | approved | — | `kyb.approved` |
        | `kyb_reject` | rejected | — | `kyb.rejected` |
        | `kyb_info_request` | requires_info | — | `kyb.info_requested` |
        | `kyc_approve` | — | approved | (application updated) |
        | `kyc_reject` | — | declined | (application updated) |
        | `kyc_info_request` | — | request_for_information | (application updated) |
        | `applicant_activate` | approved | approved | `kyb.approved` + endorsement + recipient created |
        | `applicant_suspend` | frozen | declined | `kyb.frozen` |

        **Note:** `applicant_activate` does NOT auto-create payment accounts, wallets, or
        account numbers. Create those separately via the account creation API after activation.
      operationId: simulateOnboarding
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - applicant_id
                - simulation_id
              properties:
                type:
                  type: string
                  enum:
                    - kyb_approve
                    - kyb_reject
                    - kyb_info_request
                    - kyc_approve
                    - kyc_reject
                    - kyc_info_request
                    - applicant_activate
                    - applicant_suspend
                  description: The onboarding transition to simulate
                applicant_id:
                  type: string
                  description: The onboarding application ID (from POST /applications)
                  example: 01H...
                organization_id:
                  type: string
                  description: Organization ID (for context; optional, used for logging)
                  example: org_01H...
                simulation_id:
                  type: string
                  minLength: 1
                  maxLength: 128
                  description: Unique ID for this simulation (for idempotency and tracing)
                  example: sim_03H...
                reason_code:
                  type: string
                  description: Optional reason code for reject/info_request transitions
                  example: MISSING_EIN
                info_request_fields:
                  type: array
                  items:
                    type: string
                  description: Fields to request (for *_info_request types only)
                  example:
                    - ssn
                    - address
            example:
              type: kyb_approve
              applicant_id: 01HABCDEFG1234567890XYZ
              simulation_id: sim_kyb_approve_001
      responses:
        '200':
          description: Onboarding transition applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulation_id:
                    type: string
                  applicant_id:
                    type: string
                  previous_state:
                    type: string
                    description: KYB status before the transition
                  new_state:
                    type: string
                    description: KYB status after the transition
              example:
                simulation_id: sim_kyb_approve_001
                applicant_id: 01HABCDEFG1234567890XYZ
                previous_state: pending
                new_state: approved
        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#invalid-request
                title: Invalid request
                status: 400
                detail: Invalid request
                instance: https://api.platform.dakota.xyz/sandbox/simulate/onboarding
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '403':
          description: Not available in production
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#forbidden
                title: Not available in production
                status: 403
                detail: Not available in production
                instance: https://api.platform.dakota.xyz/sandbox/simulate/onboarding
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '404':
          description: Applicant not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#not-found
                title: Applicant not found
                status: 404
                detail: Applicant not found
                instance: https://api.platform.dakota.xyz/sandbox/simulate/onboarding
