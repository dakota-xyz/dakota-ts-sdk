openapi: 3.0.3
info:
  title: Dakota Platform API
  version: 1.0.0
  description: |-
    Combined API specification for Dakota Platform services:
    - Issuance API: Asset minting and burning operations
    - Onboarding API: Know Your Business/Customer verification
    - On/Off Ramp API: Managing on-ramp and off-ramp accounts
    - Recipients API: Managing destinations for KYB'd entities
    - Transactions API: Viewing transaction history across platform operations

    ## Authentication and API Headers

    All API endpoints require the following headers:

    - `x-idempotency-key`: Required for all POST endpoints to ensure request idempotency
    - `x-api-key`: Required for authentication across all endpoints

    Note: On /applications endpoints you need a token for authentication instead of a x-api-key
    - `x-application-token`: Required for authentication on public /applications endpoints (alternative to `x-api-key` where documented)


    ## Rate Limits

    Requests are rate limited per API key. Every response includes the following headers:

    | Header | Description |
    | --- | --- |
    | `X-RateLimit-Limit` | Maximum requests allowed in the current one-minute window. |
    | `X-RateLimit-Remaining` | Requests remaining in the current window. |
    | `X-RateLimit-Reset` | Absolute Unix timestamp (seconds since epoch) when the current rate-limit window resets. |

    When a request is throttled (`429`), responses also include `Retry-After` with seconds to wait before retrying.
servers:
  - url: https://api.platform.dakota.xyz
    description: Production environment
  - url: https://api.platform.sandbox.dakota.xyz
    description: Sandbox — safe for testing with simulated data
security:
  - ApiKeyAuth: []
tags:
  - name: Customers
    description: |-
      Manage customer entities representing businesses and organizations onboarded to Dakota.

      **Prerequisites:** Complete KYB via Onboarding endpoints before initiating money movement.
      **Related:** Onboarding, Recipients, Transactions, Accounts, Wallets
  - name: Wallets
    description: |-
      Manage wallets, balances, and wallet-to-signer-group relationships for custody and movement controls.

      **Prerequisites:** Customer must exist. Configure signer groups before policy-enforced workflows.
      **Related:** Signer Groups, Policies, Transactions, Customers
  - name: Transactions
    description: |-
      Create, cancel, and retrieve transaction records across account and wallet flows.

      **Prerequisites:** Accounts or destinations must be configured based on flow type.
      **Related:** Accounts, Recipients, Policies, Events
  - name: Recipients
    description: |-
      Manage recipient entities and destination rails used by customers for payouts and transfers.

      **Prerequisites:** Customer must be onboarded and active.
      **Related:** Customers, Transactions, Accounts, Onboarding
  - name: Accounts
    description: |-
      Manage account resources used for onramp, offramp, and swap operations.

      **Prerequisites:** Customer must be created and network/asset constraints must be known.
      **Related:** Customers, Transactions, Auto Transactions, Info
  - name: Auto Transactions
    description: |-
      Manage automated transaction configurations and execution history for account automation workflows.

      **Prerequisites:** Source account must exist and be configured for automation.
      **Related:** Accounts, Transactions, Events
  - name: Onboarding
    description: |-
      Manage KYB/KYC onboarding lifecycle, application documents, attestations, and verification steps.

      **Prerequisites:** Customer context and required entity/application metadata.
      **Related:** Customers, Exceptions, Recipients, Transactions
  - name: Policies
    description: |-
      Define and manage policy objects and rules used for transaction governance and risk controls.

      **Prerequisites:** Wallet and signer group resources should be configured for enforcement scenarios.
      **Related:** Wallets, Signer Groups, Transactions
  - name: Signer Groups
    description: |-
      Manage signer groups and signer assignments for multi-party authorization models.

      **Prerequisites:** Wallets should exist before linking signer groups.
      **Related:** Wallets, Policies, Transactions
  - name: Authentication
    description: |-
      Manage API authentication credentials and key lifecycle for platform access.

      **Prerequisites:** Client organization must be provisioned.
      **Related:** Users, Info
  - name: Users
    description: |-
      Manage client users, roles, and identity metadata for platform access control.

      **Prerequisites:** Auth credentials and client context must be established.
      **Related:** Authentication
  - name: Webhooks
    description: |-
      Manage outbound webhook targets and delivery configuration for event notifications.

      **Prerequisites:** Subscriber endpoint must be reachable and secured.
      **Related:** Events, Authentication
  - name: Events
    description: |-
      Retrieve event records emitted by platform operations for audit and troubleshooting.

      **Prerequisites:** Requesting client must have access to referenced resources.
      **Related:** Webhooks, Transactions, Onboarding
  - name: Info
    description: |-
      Read platform capability metadata, such as supported rails, networks, and assets.

      **Prerequisites:** Valid authentication headers.
      **Related:** Accounts, Transactions
  - name: Sandbox
    description: |-
      Trigger sandbox-only simulation endpoints for safe end-to-end integration testing with synthetic data.

      **Prerequisites:** Sandbox environment and test customer data.
      **Related:** Customers, Accounts, Transactions, Onboarding
paths:
  /customers:
    post:
      tags:
        - Customers
      summary: Create a customer record
      description: Creates a new customer for the authenticated client and returns the created customer record.
      operationId: createCustomer
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
            example:
              name: Acme Corporation
              customer_type: business
              external_id: external_customer_123
      responses:
        '201':
          description: Customer record successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerCreateResponse'
              example:
                id: 1NFHrqBHb3cTfLVkFSGmHZqdDPi
                kyb_links:
                  - provider_id: trm_labs
                    link_type: persona
                    url: https://verify.provider.com/kyb/a1b2c3d4e5f6
                    status: pending
                    created_at: 1234567890
                    updated_at: 1234567890
                    expires_at: 1234567890
                    deleted_at: 1234567890
                application_id: 1NFHrqBHb3cTfLVkFSGmHZqdDPi
                application_url: https://apply.dakota.com/applications/2WGC9cKv9P4K8eGzqY6qJ3Xz7Qm?token=kJ8xN3zQ9mL2pR5vY7wC1aF4dG6hK0sT8uW3nB5eM9
                application_expires_at: 1734567890000000000
        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#invalid-request
                title: Invalid request
                status: 400
                detail: Invalid request
                instance: https://api.platform.dakota.xyz/customers
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '401':
          description: Unauthorized
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#authentication-error
                title: Unauthorized
                status: 401
                detail: Unauthorized
                instance: https://api.platform.dakota.xyz/customers
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        '403':
          description: Forbidden
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
              example:
                type: https://docs.dakota.xyz/api-reference/errors#forbidden
                title: Forbidden
                status: 403
                detail: Forbidden
                instance: https://api.platform.dakota.xyz/customers
                request_id: req_01hzy6y7v8w9x0y1z2a3b4c5d6
        default:
          description: Unexpected error
      externalDocs:
        description: Read full guide in docs
        url: https://docs.dakota.xyz/api-reference/customers/create-a-customer-record
    get:
      tags:
        - Customers
      summary: List all customer records
      description: Returns a paginated list of customers for the authenticated client. Supports cursor pagination and optional `external_id` or `search` filters.
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/StartingAfterParam'
        - $ref: '#/components/parameters/EndingBeforeParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: external_id
          in: query
          description: Filter customers by external ID
          required: false
          schema:
            type: string
        - name: search
          in: query
          description: Search customers by name, email, or customer ID (case-insensitive)
          required: false
          schema:
            type: string
        - name: kyb_status
          in: query
          description: Filter customers by KYB status
          required: false
          schema:
            $ref: '#/components/schemas/KybStatus'
      responses:
        '200':
          description: List of all customer records
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
                  meta:
                    $ref: '#/components/schemas/Meta'
              example:
                data:
                  - id: 1NFHrqBHb3cTfLVkFSGmHZqdDPi
                    name: Acme Corp
                    email: contact@acmecorp.com
                    customer_type: business
                    kyb_status: pending
                    kyb_links:
                      - provider_id: trm_labs
                        link_type: persona
                        url: https://verify.provider.com/kyb/a1b2c3d4e5f6
                        status: pending
                        created_at: 1234567890
                        updated_at: 1234567890
                        expires_at: 1234567890
                        deleted_at: 1234567890
                    provider_statuses:
                      - provider_id: trm_labs
                        status: approved
                        endorsements:
                          - string
                    application_id: 1NFHrqBHb3cTfLVkFSGmHZqdDPi
                    decision: approved
                    application_url: https://onboarding.example.com/applications/abc123?token=xyz789
                    created_at: 1234567890
                    updated_at: 1234567890
                    deleted_at: 1234567890
