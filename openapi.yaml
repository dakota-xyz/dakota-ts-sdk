        - certificate_of_incorporation
        - articles_of_incorporation
        - certificate_of_good_standing
        - corporate_registry_extract
        - shareholder_registry
        - bank_reference_letter
        - operating_agreement
        - memorandum
        - articles_of_association
        - proof_of_address
        - bank_statement
        - utility_bill
        - source_of_funds
        - crypto_statement
        - investment_statement
        - subscription_agreement
        - safe_agreement
        - convertible_note
        - loan_agreement
        - promissory_note
        - pitch_deck
        - marketing_material
        - business_plan
        - regulatory_license
        - payslip
        - employment_contract
        - shareholders_agreement
        - income_verification_letter
        - savings_statement
      example: articles_of_incorporation
    ApplicationDocumentUploadRequest:
      type: object
      description: Request to upload an application-level document
      required:
        - document_type
        - file_type
        - file_content
        - country
      properties:
        document_type:
          $ref: '#/components/schemas/ApplicationDocumentType'
        file_type:
          $ref: '#/components/schemas/FileType'
        file_content:
          type: string
          format: byte
          description: Base64-encoded file content. Maximum size after decoding is 20MB.
          example: JVBERi0xLjQKJeLjz9MKMw==
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code for the document
          minLength: 2
          maxLength: 2
          example: US
        id_number:
          type: string
          description: Optional ID/registration number. Required for formation documents.
          minLength: 3
          maxLength: 50
        filename:
          type: string
          maxLength: 100
          description: Optional original filename. Will be sanitized for safe storage and display.
          example: source_of_wealth.pdf
        description:
          type: string
          maxLength: 500
          description: Optional description of the document
          example: Q3 2024 bank statement
    ApplicationDocumentUploadUrlRequest:
      type: object
      description: Request to create a presigned upload session for an application-level document
      required:
        - document_type
        - file_type
        - country
      properties:
        document_type:
          $ref: '#/components/schemas/ApplicationDocumentType'
        file_type:
          $ref: '#/components/schemas/FileType'
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code for the document
          minLength: 2
          maxLength: 2
          example: US
        id_number:
          type: string
          description: Optional ID/registration number. Required for formation documents.
          minLength: 3
          maxLength: 50
        filename:
          type: string
          maxLength: 100
          description: Optional original filename. Will be sanitized for safe storage and display.
          example: source_of_wealth.pdf
    IndividualDocumentUploadRequest:
      type: object
      description: Request to upload a document for an individual (identity or EDD document). For identity documents (passport, drivers_license_front, drivers_license_back, residence_permit_front, residence_permit_back), id_number is required.
      required:
        - type
        - file_type
        - file_content
        - country
      properties:
        type:
          $ref: '#/components/schemas/IndividualDocumentType'
        file_type:
          $ref: '#/components/schemas/FileType'
        file_content:
          type: string
          format: byte
          description: Base64-encoded file content. Maximum size after decoding is 10MB.
          example: JVBERi0xLjQKJeLjz9MKMw==
        id_number:
          type: string
          description: REQUIRED for identity documents (passport, driver's license, residence permit). The ID number on the document (e.g., passport number, driver's license number). Not required for EDD documents like bank statements.
          example: AB1234567
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code of the issuing country. Required for identity documents, not required for EDD documents.
          minLength: 2
          maxLength: 2
          example: US
        filename:
          type: string
          maxLength: 100
          description: Optional original filename. Will be sanitized for safe storage and display.
          example: passport_front.jpg
        valid_until:
          type: string
          format: date
          description: Optional expiration date of the identity document in YYYY-MM-DD format
          example: '2027-04-20'
    DocumentUploadResponse:
      type: object
      description: Response after successfully uploading a document
      required:
        - document_id
      properties:
        document_id:
          $ref: '#/components/schemas/KSUID'
    IndividualDocumentUploadUrlRequest:
      type: object
      description: Request to generate a presigned URL for uploading an individual document (identity or EDD). For identity documents (passport, drivers_license_front, drivers_license_back, residence_permit_front, residence_permit_back), id_number is required.
      required:
        - document_type
        - file_type
        - country
      properties:
        document_type:
          $ref: '#/components/schemas/IndividualDocumentType'
        id_number:
          type: string
          description: REQUIRED for identity documents (passport, driver's license, residence permit). The ID number on the document (e.g., passport number, driver's license number). Not required for EDD documents like bank statements.
          example: AB1234567
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code of the issuing country. Required for identity documents, not required for EDD documents.
          minLength: 2
          maxLength: 2
          example: US
        file_type:
          $ref: '#/components/schemas/FileType'
        filename:
          type: string
          maxLength: 100
          description: Optional original filename. Will be sanitized for safe storage and display.
          example: passport_front.jpg
    DocumentUploadUrlResponse:
      type: object
      description: Response containing a presigned URL for document upload
      required:
        - upload_url
        - upload_id
        - object_path
        - expires_at
      properties:
        upload_url:
          type: string
          format: uri
          description: Presigned URL to upload the document to. Use PUT method with the file content.
          example: https://storage.googleapis.com/bucket/path?...
        upload_id:
          type: string
          description: Unique identifier for this upload. Use this when calling the verify endpoint.
          example: 2hCjxJzUAW6JVRkZqaF9E0KpM3a
        object_path:
          type: string
          description: The GCS object path where the document will be stored. Pass this to the verify endpoint.
          example: applications/business/2hCjxJzUAW6JVRkZqaF9E0KpM3a/business-documents/2hDeFgHiJkLmNoPqRsTuVwXyZ
        expires_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the presigned URL expires
          example: '2025-01-15T18:30:00Z'
    IndividualDocumentType:
      type: string
