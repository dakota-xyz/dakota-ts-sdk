        - id
        - client_id
        - family
        - address
        - name
      properties:
        id:
          $ref: '#/components/schemas/KSUID'
        client_id:
          $ref: '#/components/schemas/KSUID'
        customer_id:
          $ref: '#/components/schemas/KSUID'
        family:
          $ref: '#/components/schemas/Family'
        address:
          type: string
