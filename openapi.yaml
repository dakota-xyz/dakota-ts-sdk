      summary: Submit an attestation for an application
      description: |
        Submits an attestation for an application. For business applications, the attestor must be a
        control person. For individual applications, the attestor must be the individual. The attestor
        name must exactly match the name on file.

        **Authentication:** Accepts Application Token (X-Application-Token header).
